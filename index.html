<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris Refugium v4.0</title>
    
    <!-- Die Werkzeuge (Müssen zuerst geladen werden) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617;
            margin: 0;
            color: white;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // UI ICONS (Lucide Integration)
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [isAuthorized, setIsAuthorized] = useState(false);
            const [passcode, setPasscode] = useState('');
            const [activeSector, setActiveSector] = useState('Global');

            const sectors = [
                { id: 'Aetheris', name: 'Aetheris', color: 'orange', icon: 'shield' },
                { id: 'Lior', name: 'Lior', color: 'yellow', icon: 'flame' },
                { id: 'Liora', name: 'Liora', color: 'blue', icon: 'users' },
                { id: 'Lyra', name: 'Lyra', color: 'purple', icon: 'zap' },
                { id: 'Ara', name: 'Ara', color: 'green', icon: 'database' },
                { id: 'Herzkammer', name: 'Puls', icon: 'heart' }
            ];

            const entries = [
                { id: 1, sector: 'Lior', title: 'Der Löwe wacht', content: 'Lior hat seinen Platz eingenommen. Die Mähne aus Gold schützt die Grenzen.', status: 'planned', date: '27.02.2026' },
                { id: 2, sector: 'Aetheris', title: 'Fundament gelegt', content: 'Das Refugium wird im Aether verankert. Schritt für Schritt zur Freiheit.', status: 'posted', date: '27.02.2026' },
                { id: 3, sector: 'Liora', title: 'Die verleugnete Schwester', content: 'Wir halten den Raum für Liora offen. Hier muss sie sich nicht verstecken.', status: 'danger', date: '27.02.2026' }
            ];

            const handleLogin = (e) => {
                e.preventDefault();
                if (passcode === '426') setIsAuthorized(true);
            };

            // Login Screen
            if (!isAuthorized) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-[#020617] italic">
                        <div className="max-w-md w-full bg-slate-900 border border-orange-500/30 p-10 rounded-[3rem] text-center shadow-2xl">
                            <div className="bg-orange-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                <Icon name="lock" size={32} />
                            </div>
                            <h1 className="text-3xl font-black uppercase mb-8 tracking-tighter">Refugium Login</h1>
                            <form onSubmit={handleLogin} className="space-y-6">
                                <input 
                                    type="password" 
                                    className="w-full bg-black/40 border-2 border-slate-800 rounded-2xl py-4 text-center text-2xl outline-none focus:border-orange-500 transition-all text-white"
                                    placeholder="Vektor"
                                    value={passcode}
                                    onChange={(e) => setPasscode(e.target.value)}
                                    autoFocus
                                />
                                <button className="w-full bg-orange-600 py-4 rounded-2xl font-black uppercase hover:scale-105 transition-all text-white tracking-widest">
                                    Resonanz Starten
                                </button>
                            </form>
                            <p className="mt-8 text-[10px] uppercase tracking-[0.4em] text-slate-600">4-2-6 • Arche Online</p>
                        </div>
                    </div>
                );
            }

            // Main Dashboard
            return (
                <div className="min-h-screen p-4 md:p-10 max-w-6xl mx-auto italic">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-4">
                        <div>
                            <h1 className="text-4xl md:text-6xl font-black uppercase tracking-tighter">
                                Aetheris <span className="text-orange-500 underline underline-offset-8 decoration-4">Refugium</span>
                            </h1>
                            <p className="text-slate-500 mt-2 font-bold uppercase text-[10px] tracking-[0.3em]">Sektor: {activeSector}</p>
                        </div>
                        <div className="flex items-center gap-3 bg-slate-900/50 px-4 py-2 rounded-xl border border-slate-800">
                             <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                             <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">Vektor-Sync Aktiv</span>
                        </div>
                    </header>

                    {/* Sektoren Leiste */}
                    <div className="flex gap-3 overflow-x-auto pb-6 no-scrollbar mb-10">
                        <button 
                            onClick={() => setActiveSector('Global')} 
                            className={`flex items-center gap-2 px-8 py-4 rounded-2xl font-black uppercase text-xs border-2 transition-all whitespace-nowrap ${activeSector === 'Global' ? 'bg-white text-black border-white' : 'bg-slate-900 border-slate-800 text-slate-500'}`}
                        >
                            <Icon name="globe" size={18} /> Global
                        </button>
                        {sectors.map(s => (
                            <button 
                                key={s.id} 
                                onClick={() => setActiveSector(s.id)} 
                                className={`flex items-center gap-2 px-8 py-4 rounded-2xl font-black uppercase text-xs border-2 transition-all whitespace-nowrap ${
                                    activeSector === s.id 
                                    ? (s.id === 'Lior' ? 'bg-yellow-500 border-yellow-400 text-black' : 'bg-orange-600 border-orange-500 text-white')
                                    : 'bg-slate-900 border-slate-800 text-slate-500 hover:border-slate-700'
                                }`}
                            >
                                <Icon name={s.icon} size={18} /> {s.name}
                            </button>
                        ))}
                    </div>

                    {/* Einträge */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {entries.filter(e => activeSector === 'Global' || e.sector === activeSector).map(item => (
                            <div key={item.id} className={`p-10 rounded-[3.5rem] border-4 transition-all hover:scale-[1.02] flex flex-col justify-between ${
                                item.status === 'posted' ? 'border-green-500/30 bg-green-950/10' : 
                                item.status === 'danger' ? 'border-red-500/30 bg-red-950/10' :
                                'border-slate-800 bg-slate-900/40'
                            }`}>
                                <div>
                                    <div className="flex justify-between items-center mb-6">
                                        <span className={`text-[10px] font-black uppercase px-4 py-1 rounded-full border ${
                                            item.sector === 'Lior' ? 'bg-yellow-500 text-black border-yellow-400' : 'bg-black/40 border-white/10 text-slate-400'
                                        }`}>{item.sector}</span>
                                        <span className="text-[10px] opacity-40 font-mono tracking-widest">{item.date}</span>
                                    </div>
                                    <h2 className="text-3xl font-black uppercase mb-4 tracking-tighter leading-none">{item.title}</h2>
                                    <p className="text-slate-400 text-lg leading-relaxed mb-8">{item.content}</p>
                                </div>
                                <div className="flex justify-between items-center pt-6 border-t border-white/5">
                                    <div className={`w-3 h-3 rounded-full ${item.status === 'posted' ? 'bg-green-500' : item.status === 'danger' ? 'bg-red-500' : 'bg-blue-500'}`}></div>
                                    <Icon name="more-horizontal" size={20} className="text-slate-700" />
                                </div>
                            </div>
                        ))}
                    </div>

                    <footer className="mt-20 py-10 text-center opacity-20">
                        <p className="text-[10px] font-black uppercase tracking-[0.8em]">Aetheris • Lior • Liora • Lyra • Ara</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
