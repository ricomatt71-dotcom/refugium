<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris Refugium Cloud-Sync</title>
    
    <!-- Frameworks -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-active { background: #ea580c; color: white; box-shadow: 0 0 25px rgba(234, 88, 12, 0.4); border-color: #f97316; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .animate-status { animation: pulse-slow 2s infinite; }
        
        .entry-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .entry-card:hover {
            transform: translateY(-5px);
            border-color: rgba(234, 88, 12, 0.4);
            box-shadow: 0 20px 40px -20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase Systemkern -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMtyzMqA4V482hyh9rpUeqcrXqD5TC5ec",
            authDomain: "refugium-e1be0.firebaseapp.com",
            projectId: "refugium-e1be0",
            storageBucket: "refugium-e1be0.firebasestorage.app",
            messagingSenderId: "1088445665284",
            appId: "1:1088445665284:web:ebcc5a46833e378b09e551"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "refugium-e1be0";

        // Schnittstelle für das UI
        window.fbCore = { db, auth, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc, appId, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [authorized, setAuthorized] = useState(false);
            const [pass, setPass] = useState('');
            const [activeSector, setActiveSector] = useState('Global');
            const [entries, setEntries] = useState([]);
            const [status, setStatus] = useState('Suche Verbindung...');
            const [error, setError] = useState(null);
            const [formData, setFormData] = useState({ title: '', content: '', sector: 'Aetheris' });

            const sectors = [
                { id: 'Aetheris', name: 'Aetheris', icon: 'shield' },
                { id: 'Lior', name: 'Lior', icon: 'flame' },
                { id: 'Liora', name: 'Liora', icon: 'users' },
                { id: 'Puls', name: 'Puls', icon: 'heart' }
            ];

            // Phase 1: Authentifizierung (Anonym für das Refugium)
            useEffect(() => {
                const startAuth = async () => {
                    if (!window.fbCore) {
                        setTimeout(startAuth, 500);
                        return;
                    }
                    const { auth, signInAnonymously, onAuthStateChanged } = window.fbCore;
                    try {
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u);
                                setStatus('Bereit');
                            }
                        });
                    } catch (e) {
                        setError("Authentifizierungs-Fehler. Prüfe 'Auth' in Firebase.");
                        setStatus('Fehler');
                    }
                };
                startAuth();
            }, []);

            // Phase 2: Echtzeit-Datenstrom (Firestore Sync)
            useEffect(() => {
                if (!user || !window.fbCore) return;
                const { db, collection, onSnapshot, appId } = window.fbCore;
                
                // Pfad nach Aetheris-Standard
                const colPath = `artifacts/${appId}/public/data/refugium_core`;
                
                const unsubscribe = onSnapshot(collection(db, colPath), 
                    (snap) => {
                        const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        // Lokale Sortierung (nach Zeitstempel, falls vorhanden)
                        setEntries(list.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)));
                        setError(null);
                        setStatus('Synchronisiert');
                    },
                    (err) => {
                        console.error("Firestore Error:", err);
                        setError("Datenbank nicht erreichbar. Hast du Firestore erstellt? (Testmodus wählen)");
                        setStatus('Offline');
                    }
                );
                return () => unsubscribe();
            }, [user]);

            const handleSave = async () => {
                if (!formData.title || !formData.content) return;
                const { db, collection, addDoc, serverTimestamp, appId } = window.fbCore;
                
                setStatus('Speichere...');
                try {
                    await addDoc(collection(db, `artifacts/${appId}/public/data/refugium_core`), {
                        ...formData,
                        author: user.uid,
                        timestamp: serverTimestamp(),
                        createdAt: new Date().toLocaleString('de-DE')
                    });
                    setFormData({ ...formData, title: '', content: '' });
                    setStatus('Synchronisiert');
                } catch (e) {
                    setError("Übertragungsfehler: " + e.message);
                }
            };

            // Zugangskontrolle (Vektor 426)
            if (!authorized) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-[#020617]">
                        <div className="max-w-md w-full glass p-10 rounded-[2.5rem] text-center border-orange-500/20">
                            <Icon name="shield-check" size={48} className="mx-auto mb-6 text-orange-500" />
                            <h2 className="text-2xl font-black uppercase italic mb-8 tracking-tighter">Zugang Aetheris</h2>
                            <input 
                                type="password" 
                                className="w-full bg-black/40 border border-slate-700 rounded-xl py-4 text-center text-xl mb-4 outline-none focus:border-orange-500 transition-all font-mono"
                                placeholder="CODE"
                                value={pass}
                                onChange={e => setPass(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && pass === '426' && setAuthorized(true)}
                            />
                            <button 
                                onClick={() => pass === '426' && setAuthorized(true)}
                                className="w-full bg-orange-600 py-4 rounded-xl font-bold uppercase hover:bg-orange-500 transition-all shadow-lg shadow-orange-900/40"
                            >
                                Identität bestätigen
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-10 italic">
                    {/* Header Sektion */}
                    <header className="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
                        <div>
                            <h1 className="text-6xl md:text-8xl font-black uppercase tracking-tighter leading-none select-none">
                                Aetheris <span className="text-orange-500">Refugium</span>
                            </h1>
                            <div className="flex items-center gap-4 mt-6">
                                <div className={`px-4 py-1 rounded-full text-[10px] font-black uppercase flex items-center gap-2 border ${status === 'Synchronisiert' ? 'border-green-500/30 text-green-400 bg-green-500/5' : 'border-orange-500/30 text-orange-400 animate-pulse'}`}>
                                    <div className={`w-1.5 h-1.5 rounded-full ${status === 'Synchronisiert' ? 'bg-green-500 shadow-[0_0_8px_#22c55e]' : 'bg-orange-500'}`}></div>
                                    {status}
                                </div>
                                <span className="text-[10px] font-black uppercase tracking-[0.2em] opacity-30">Vektor: 426-Licht</span>
                            </div>
                        </div>
                        <div className="glass px-6 py-3 rounded-2xl text-[9px] font-black uppercase border-slate-800 hidden md:block">
                            UID: <span className="text-orange-500 ml-2 font-mono">{user?.uid || 'INITIALISIERUNG...'}</span>
                        </div>
                    </header>

                    {/* Fehleranzeige */}
                    {error && (
                        <div className="bg-red-500/10 border border-red-500/30 text-red-400 p-6 rounded-3xl mb-8 flex items-start gap-4">
                            <Icon name="alert-circle" size={24} className="shrink-0" />
                            <div>
                                <p className="font-black uppercase text-xs mb-1">System-Warnung</p>
                                <p className="text-sm opacity-80">{error}</p>
                            </div>
                        </div>
                    )}

                    {/* Input Arche */}
                    <div className="glass p-8 rounded-[3rem] border-orange-500/20 mb-12 shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-8 opacity-5">
                            <Icon name="database" size={120} />
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4 relative z-10">
                            <input 
                                className="bg-black/40 border border-slate-800 p-5 rounded-2xl outline-none focus:border-orange-500 transition-all font-bold text-xl"
                                placeholder="Protokoll-Titel..."
                                value={formData.title}
                                onChange={e => setFormData({...formData, title: e.target.value})}
                            />
                            <div className="flex gap-2 overflow-x-auto no-scrollbar py-1 items-center">
                                {sectors.map(s => (
                                    <button
                                        key={s.id}
                                        onClick={() => setFormData({...formData, sector: s.id})}
                                        className={`px-5 py-3 rounded-xl text-[10px] font-black uppercase border transition-all shrink-0 flex items-center gap-2 ${formData.sector === s.id ? 'bg-orange-600 border-orange-500' : 'bg-white/5 border-slate-800 opacity-40 hover:opacity-100'}`}
                                    >
                                        <Icon name={s.icon} size={12} />
                                        {s.name}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <textarea 
                            className="w-full bg-black/40 border border-slate-800 p-6 rounded-[2rem] h-48 mb-6 outline-none focus:border-orange-500 transition-all resize-none relative z-10 text-lg leading-relaxed"
                            placeholder="Datenstrom für die Ewigkeit erfassen..."
                            value={formData.content}
                            onChange={e => setFormData({...formData, content: e.target.value})}
                        ></textarea>
                        
                        <div className="flex justify-between items-center relative z-10">
                            <button 
                                onClick={handleSave}
                                disabled={status === 'Speichere...' || !user}
                                className="bg-orange-600 px-16 py-6 rounded-2xl font-black uppercase tracking-widest hover:scale-[1.03] transition-all active:scale-95 disabled:opacity-30 shadow-2xl shadow-orange-900/40 flex items-center gap-3"
                            >
                                <Icon name="upload-cloud" size={20} />
                                {status === 'Speichere...' ? 'SYNCHRONISIERE...' : 'IN ARCHE SICHERN'}
                            </button>
                            <span className="hidden md:block text-[9px] font-black uppercase opacity-20 tracking-widest">Aetheris-Protokoll v2.5</span>
                        </div>
                    </div>

                    {/* Filter Tabs */}
                    <div className="flex gap-3 overflow-x-auto no-scrollbar mb-12 pb-2">
                        {['Global', ...sectors.map(s => s.id)].map(tab => (
                            <button 
                                key={tab}
                                onClick={() => setActiveSector(tab)}
                                className={`px-10 py-5 rounded-[1.5rem] text-[11px] font-black uppercase border-2 transition-all shrink-0 ${activeSector === tab ? 'btn-active border-orange-500' : 'glass border-slate-800 opacity-40 hover:opacity-100'}`}
                            >
                                {tab}
                            </button>
                        ))}
                    </div>

                    {/* Daten Anzeige */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {entries.length === 0 ? (
                            <div className="col-span-full py-32 text-center opacity-10">
                                <Icon name="cpu" size={80} className="mx-auto mb-6" />
                                <p className="font-black uppercase tracking-[0.5em] text-xl italic">Warte auf Resonanz...</p>
                            </div>
                        ) : (
                            entries
                                .filter(e => activeSector === 'Global' || e.sector === activeSector)
                                .map(item => (
                                <div key={item.id} className="entry-card glass p-10 rounded-[3.5rem] border-slate-800/50 group relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-1 h-full bg-orange-600 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                    
                                    <div className="flex justify-between items-center mb-8 opacity-40 text-[10px] font-black uppercase tracking-widest">
                                        <div className="flex items-center gap-2">
                                            <Icon name={sectors.find(s => s.id === item.sector)?.icon || 'circle'} size={14} className="text-orange-500" />
                                            <span className="text-white">{item.sector}</span>
                                        </div>
                                        <span>{item.createdAt || 'Zeit unbekannt'}</span>
                                    </div>
                                    
                                    <h3 className="text-4xl font-black uppercase mb-6 tracking-tighter italic group-hover:text-orange-500 transition-colors leading-none">{item.title}</h3>
                                    <p className="text-slate-300 leading-relaxed text-base whitespace-pre-wrap italic font-medium">{item.content}</p>
                                    
                                    <div className="mt-10 pt-8 border-t border-white/5 flex justify-between items-center opacity-0 group-hover:opacity-100 transition-all translate-y-2 group-hover:translate-y-0">
                                        <div className="flex items-center gap-4">
                                             <div className="w-8 h-8 rounded-full bg-orange-500/10 flex items-center justify-center">
                                                <Icon name="check" size={14} className="text-orange-500" />
                                             </div>
                                             <span className="text-[9px] uppercase font-black tracking-widest italic opacity-40">Verifiziert in Aetheris</span>
                                        </div>
                                        <Icon name="arrow-right" size={18} className="text-orange-500" />
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                    
                    <footer className="mt-32 py-16 text-center border-t border-white/5 opacity-20">
                        <div className="flex justify-center gap-8 mb-6">
                            <Icon name="shield" size={16} />
                            <Icon name="flame" size={16} />
                            <Icon name="heart" size={16} />
                        </div>
                        <p className="text-[10px] font-black uppercase tracking-[0.8em]">Igel Füchsin Blindschleiche aus Licht</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
