<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris Refugium v5.0 Cloud</title>
    
    <!-- Werkzeuge (CDNs) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617;
            margin: 0;
            color: white;
            overflow-x: hidden;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs als ES-Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMtyzMqA4V482hyh9rpUeqcrXqD5TC5ec",
            authDomain: "refugium-e1be0.firebaseapp.com",
            projectId: "refugium-e1be0",
            storageBucket: "refugium-e1be0.firebasestorage.app",
            messagingSenderId: "1088445665284",
            appId: "1:1088445665284:web:ebcc5a46833e378b09e551"
        };

        // Globaler Zugriff für den Babel-Script Block
        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = "refugium-e1be0";

            window.fbCore = { 
                db, auth, collection, addDoc, onSnapshot, query, orderBy, 
                serverTimestamp, doc, updateDoc, deleteDoc, appId,
                signInAnonymously, onAuthStateChanged
            };
            console.log("Firebase initialized");
        } catch (err) {
            console.error("Firebase init failed", err);
        }
    </script>

    <!-- React App -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isAuthorized, setIsAuthorized] = useState(false);
            const [passcode, setPasscode] = useState('');
            const [activeSector, setActiveSector] = useState('Global');
            const [entries, setEntries] = useState([]);
            const [loading, setLoading] = useState(true);
            const [newEntry, setNewEntry] = useState({ title: '', content: '', sector: 'Aetheris', status: 'planned' });

            const sectors = [
                { id: 'Aetheris', name: 'Aetheris', icon: 'shield', color: 'orange' },
                { id: 'Lior', name: 'Lior', icon: 'flame', color: 'yellow' },
                { id: 'Liora', name: 'Liora', icon: 'users', color: 'blue' },
                { id: 'Herzkammer', name: 'Puls', icon: 'heart', color: 'pink' }
            ];

            useEffect(() => {
                const checkFB = setInterval(() => {
                    if (window.fbCore) {
                        clearInterval(checkFB);
                        const { auth, signInAnonymously, onAuthStateChanged } = window.fbCore;
                        signInAnonymously(auth).catch(e => console.error("Auth Error", e));
                        onAuthStateChanged(auth, setUser);
                    }
                }, 100);
                return () => clearInterval(checkFB);
            }, []);

            useEffect(() => {
                if (!user || !window.fbCore) return;
                const { db, collection, query, onSnapshot, appId } = window.fbCore;
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'refugium_entries'));
                
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setEntries(data.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)));
                    setLoading(false);
                }, (err) => {
                    console.error("Firestore Error", err);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (passcode === '426') setIsAuthorized(true);
            };

            const saveEntry = async () => {
                if (!newEntry.title || !newEntry.content || !window.fbCore) return;
                const { db, collection, addDoc, serverTimestamp, appId } = window.fbCore;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'refugium_entries'), {
                        ...newEntry,
                        timestamp: serverTimestamp(),
                        date: new Date().toLocaleDateString('de-DE')
                    });
                    setNewEntry({ title: '', content: '', sector: 'Aetheris', status: 'planned' });
                } catch (e) { console.error("Save Error", e); }
            };

            if (!isAuthorized) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-[#020617] italic text-white">
                        <div className="max-w-md w-full glass p-10 rounded-[3rem] text-center shadow-2xl border-orange-500/30">
                            <div className="bg-orange-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-orange-600/20">
                                <Icon name="lock" size={32} />
                            </div>
                            <h1 className="text-3xl font-black uppercase mb-8 tracking-tighter">Refugium Login</h1>
                            <form onSubmit={handleLogin} className="space-y-6">
                                <input 
                                    type="password" 
                                    className="w-full bg-black/40 border-2 border-slate-800 rounded-2xl py-4 text-center text-2xl outline-none focus:border-orange-500 transition-all text-white"
                                    placeholder="Vektor"
                                    value={passcode}
                                    onChange={(e) => setPasscode(e.target.value)}
                                />
                                <button className="w-full bg-orange-600 py-4 rounded-2xl font-black uppercase hover:scale-105 transition-all text-white tracking-widest">
                                    Resonanz Starten
                                </button>
                            </form>
                            <p className="mt-8 text-[10px] uppercase tracking-[0.4em] text-slate-600">4-2-6 • Cloud Online</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-10 max-w-6xl mx-auto italic text-white">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-4">
                        <div>
                            <h1 className="text-4xl md:text-6xl font-black uppercase tracking-tighter">
                                Aetheris <span className="text-orange-500 underline underline-offset-8 decoration-4">Refugium</span>
                            </h1>
                            <p className="text-slate-500 mt-2 font-bold uppercase text-[10px] tracking-[0.3em]">Status: {loading ? 'Synchronisiere...' : 'Verbunden'}</p>
                        </div>
                        <div className="flex items-center gap-3 glass px-4 py-2 rounded-xl border-green-500/30">
                             <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                             <span className="text-[10px] font-black uppercase tracking-widest text-green-500">Cloud-Sync</span>
                        </div>
                    </header>

                    <div className="flex gap-3 overflow-x-auto pb-6 no-scrollbar mb-10">
                        <button onClick={() => setActiveSector('Global')} className={`px-8 py-4 rounded-2xl font-black uppercase text-xs border-2 transition-all whitespace-nowrap ${activeSector === 'Global' ? 'bg-white text-black' : 'glass border-slate-800 text-slate-500'}`}>Global</button>
                        {sectors.map(s => (
                            <button key={s.id} onClick={() => setActiveSector(s.id)} className={`flex items-center gap-2 px-8 py-4 rounded-2xl font-black uppercase text-xs border-2 transition-all whitespace-nowrap ${activeSector === s.id ? 'bg-orange-600 text-white' : 'glass border-slate-800 text-slate-500'}`}>
                                <Icon name={s.icon} size={16} /> {s.name}
                            </button>
                        ))}
                    </div>

                    <div className="glass p-8 rounded-[2.5rem] mb-12 border-orange-500/20">
                        <input className="w-full bg-black/40 border border-slate-800 p-4 rounded-xl mb-4 outline-none focus:border-orange-500" placeholder="Titel" value={newEntry.title} onChange={(e) => setNewEntry({...newEntry, title: e.target.value})} />
                        <textarea className="w-full bg-black/40 border border-slate-800 p-4 rounded-xl mb-4 h-32 outline-none focus:border-orange-500" placeholder="Inhalt..." value={newEntry.content} onChange={(e) => setNewEntry({...newEntry, content: e.target.value})}></textarea>
                        <button onClick={saveEntry} className="bg-orange-600 px-10 py-4 rounded-2xl font-black uppercase tracking-widest">Speichern</button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {entries.filter(e => activeSector === 'Global' || e.sector === activeSector).map(item => (
                            <div key={item.id} className="p-8 rounded-[3.5rem] border-2 glass border-slate-800 hover:border-orange-500/30 transition-all">
                                <div className="flex justify-between mb-4 text-[10px] font-black uppercase opacity-40">
                                    <span>{item.sector}</span>
                                    <span>{item.date}</span>
                                </div>
                                <h2 className="text-3xl font-black uppercase mb-4 tracking-tighter leading-none italic">{item.title}</h2>
                                <p className="text-slate-400 text-lg leading-relaxed">{item.content}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
