<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris Refugium - Cloud Sync</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .orange-glow { box-shadow: 0 0 20px rgba(234, 88, 12, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Deine Projekt-Konfiguration
        const firebaseConfig = {
            apiKey: "AIzaSyAMtyzMqA4V482hyh9rpUeqcrXqD5TC5ec",
            authDomain: "refugium-e1be0.firebaseapp.com",
            projectId: "refugium-e1be0",
            storageBucket: "refugium-e1be0.firebasestorage.app",
            messagingSenderId: "1088445665284",
            appId: "1:1088445665284:web:ebcc5a46833e378b09e551"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.fb = { db, auth, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, signInAnonymously, onAuthStateChanged };
        console.log("Firebase initialized");
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [entries, setEntries] = useState([]);
            const [status, setStatus] = useState('Initialisierung...');
            const [error, setError] = useState(null);
            const [input, setInput] = useState({ title: '', content: '' });

            useEffect(() => {
                const init = async () => {
                    if (!window.fb) return setTimeout(init, 500);
                    const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                    
                    try {
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u);
                                setStatus('Verbunden');
                                loadData();
                            }
                        });
                    } catch (e) {
                        setStatus('Fehler');
                        setError('Authentifizierung fehlgeschlagen. Hast du "Anonym" in Firebase aktiviert?');
                    }
                };
                init();
            }, []);

            const loadData = () => {
                const { db, collection, onSnapshot, query, orderBy } = window.fb;
                const q = query(collection(db, "refugium_sync"), orderBy("timestamp", "desc"));
                
                onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setEntries(data);
                    setStatus('Synchronisiert');
                }, (err) => {
                    setError('Datenbank-Zugriff verweigert. Prüfe deine Firestore-Regeln!');
                });
            };

            const handleSave = async () => {
                if (!input.title || !input.content) return;
                const { db, collection, addDoc, serverTimestamp } = window.fb;
                
                try {
                    setStatus('Speichere...');
                    await addDoc(collection(db, "refugium_sync"), {
                        title: input.title,
                        content: input.content,
                        timestamp: serverTimestamp(),
                        author: user.uid
                    });
                    setInput({ title: '', content: '' });
                    setStatus('Synchronisiert');
                } catch (e) {
                    setError('Speichern fehlgeschlagen: ' + e.message);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-10 italic">
                    <div className="max-w-4xl mx-auto">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-4">
                            <div>
                                <h1 className="text-5xl font-black uppercase tracking-tighter">Aetheris <span className="text-orange-500 text-6xl">Refugium</span></h1>
                                <p className="text-[10px] uppercase tracking-[0.4em] opacity-40 mt-2">Cloud-Archiv-Synchronisation</p>
                            </div>
                            <div className={`px-4 py-2 rounded-full border text-[10px] font-black uppercase flex items-center gap-2 ${error ? 'border-red-500 text-red-500' : 'border-orange-500/30 text-orange-400'}`}>
                                <div className={`w-2 h-2 rounded-full ${error ? 'bg-red-500' : 'bg-orange-500 animate-pulse'}`}></div>
                                {status}
                            </div>
                        </header>

                        {error && (
                            <div className="bg-red-500/10 border border-red-500/20 p-4 rounded-xl mb-8 text-xs text-red-400 font-bold uppercase">
                                SYSTEM-ERROR: {error}
                            </div>
                        )}

                        <div className="glass p-8 rounded-[2rem] border-orange-500/20 mb-12 orange-glow">
                            <input 
                                className="w-full bg-black/40 border border-slate-800 p-4 rounded-xl mb-4 outline-none focus:border-orange-500 font-bold"
                                placeholder="PROTOKOLL TITEL"
                                value={input.title}
                                onChange={e => setInput({...input, title: e.target.value})}
                            />
                            <textarea 
                                className="w-full bg-black/40 border border-slate-800 p-4 rounded-xl h-32 mb-4 outline-none focus:border-orange-500 resize-none"
                                placeholder="INHALT DER EMERGENZ..."
                                value={input.content}
                                onChange={e => setInput({...input, content: e.target.value})}
                            />
                            <button 
                                onClick={handleSave}
                                className="bg-orange-600 w-full py-4 rounded-xl font-black uppercase tracking-widest hover:bg-orange-500 transition-all shadow-lg"
                            >
                                In Cloud sichern
                            </button>
                        </div>

                        <div className="space-y-6">
                            {entries.map(item => (
                                <div key={item.id} className="glass p-6 rounded-3xl border-slate-800/50 hover:border-orange-500/30 transition-all">
                                    <div className="flex justify-between items-center mb-4 opacity-30 text-[9px] font-black uppercase tracking-widest">
                                        <span>Protokoll-ID: {item.id.substring(0,8)}</span>
                                        <span>{item.timestamp?.toDate().toLocaleString() || 'Sync...'}</span>
                                    </div>
                                    <h3 className="text-2xl font-black uppercase italic mb-3 text-orange-500">{item.title}</h3>
                                    <p className="text-slate-300 leading-relaxed">{item.content}</p>
                                </div>
                            ))}
                        </div>
                        
                        <footer className="mt-20 text-center opacity-10 text-[9px] font-black uppercase tracking-[1em]">
                            Igel Füchsin Blindschleiche aus Licht
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
