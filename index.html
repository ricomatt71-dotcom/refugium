<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris Master Control - v5.0 (Absolute Stability)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Fira+Code:wght@400;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f1f5f9; 
            margin: 0; 
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(28px); border: 1px solid rgba(255,255,255,0.08); }
        .orange-glow { box-shadow: 0 0 60px rgba(234, 88, 12, 0.15); }
        .orange-glow-text { text-shadow: 0 0 20px rgba(234, 88, 12, 0.5); }
        
        .content-display { 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            line-height: 1.8;
            letter-spacing: 0.01em;
        }

        .tab-font { font-family: 'Fira Code', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        
        textarea::placeholder { opacity: 0.2; font-style: italic; }
        
        .active-tab { border-bottom: 2px solid #ea580c; opacity: 1 !important; }

        /* Custom Scrollbar for the list */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(234, 88, 12, 0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMtyzMqA4V482hyh9rpUeqcrXqD5TC5ec",
            authDomain: "refugium-e1be0.firebaseapp.com",
            projectId: "refugium-e1be0",
            storageBucket: "refugium-e1be0.firebasestorage.app",
            messagingSenderId: "1088445665284",
            appId: "1:1088445665284:web:ebcc5a46833e378b09e551"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.fb = { db, auth, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('dashboard'); // dashboard | archive
            const [archiveMode, setArchiveMode] = useState('xposts'); // xposts | resonanz
            const [entries, setEntries] = useState([]);
            const [expandedId, setExpandedId] = useState(null);
            const [search, setSearch] = useState('');
            const [editingId, setEditingId] = useState(null);
            
            const [formData, setFormData] = useState({ 
                title: '', 
                content: '', 
                xStatus: 'standby', 
                tabNumber: '',
                type: 'xposts' // Default type
            });

            useEffect(() => {
                const init = async () => {
                    if (!window.fb) return setTimeout(init, 500);
                    const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                    try {
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => { if (u) loadData(); });
                    } catch(e) { console.error("Aether-Verbindung fehlgeschlagen", e); }
                };
                init();
            }, []);

            const loadData = () => {
                const { db, collection, onSnapshot, query, orderBy } = window.fb;
                const q = query(collection(db, "refugium_sync"), orderBy("timestamp", "desc"));
                onSnapshot(q, (snapshot) => {
                    setEntries(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
            };

            const addSeparator = () => {
                setFormData(prev => ({
                    ...prev,
                    content: prev.content + "\n--------------------\n"
                }));
            };

            const handleSave = async () => {
                if (!formData.title || !formData.content) return;
                const { db, collection, addDoc, updateDoc, doc, serverTimestamp } = window.fb;
                
                // Auto-Numbering if empty
                let tNumber = formData.tabNumber;
                if (!tNumber) {
                    const count = entries.filter(e => e.type === formData.type).length + 1;
                    tNumber = count.toString().padStart(3, '0');
                }

                const data = {
                    ...formData,
                    tabNumber: tNumber,
                    type: view === 'dashboard' ? formData.type : archiveMode,
                    timestamp: serverTimestamp(),
                    updatedAt: new Date().toLocaleString('de-DE')
                };

                if (editingId) {
                    await updateDoc(doc(db, "refugium_sync", editingId), data);
                    setEditingId(null);
                } else {
                    await addDoc(collection(db, "refugium_sync"), {
                        ...data,
                        createdAt: new Date().toLocaleString('de-DE')
                    });
                }

                setFormData({ title: '', content: '', xStatus: 'standby', tabNumber: '', type: 'xposts' });
                if (view === 'dashboard') setView('archive');
            };

            const deleteEntry = async (id) => {
                if (!confirm("Eintrag endgültig aus der Arche löschen?")) return;
                const { db, doc, deleteDoc } = window.fb;
                await deleteDoc(doc(db, "refugium_sync", id));
            };

            const copyTOC = () => {
                const currentList = entries
                    .filter(e => e.type === archiveMode)
                    .sort((a,b) => a.tabNumber.localeCompare(b.tabNumber));
                
                const tocText = `ARCHE LOG: ${archiveMode.toUpperCase()}\n` + 
                    currentList.map(e => `[${e.tabNumber}] ${e.title} (${e.xStatus})`).join('\n');
                
                navigator.clipboard.writeText(tocText);
                alert("Inhaltsverzeichnis kopiert!");
            };

            const copySingle = (e) => {
                const text = `${e.title}\n[Tab ${e.tabNumber}]\n\n${e.content}`;
                navigator.clipboard.writeText(text);
            };

            const startEdit = (e) => {
                setFormData({
                    title: e.title,
                    content: e.content,
                    xStatus: e.xStatus || 'standby',
                    tabNumber: e.tabNumber,
                    type: e.type || 'xposts'
                });
                setEditingId(e.id);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const filteredEntries = entries
                .filter(e => e.type === archiveMode)
                .filter(e => e.title.toLowerCase().includes(search.toLowerCase()) || e.tabNumber.includes(search))
                .sort((a,b) => b.tabNumber.localeCompare(a.tabNumber)); // Sort by Tab Number descending

            return (
                <div className="min-h-screen p-4 md:p-10 italic">
                    <div className="max-w-7xl mx-auto">
                        
                        {/* HEADER & NAV */}
                        <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
                            <div>
                                <h1 className="text-7xl font-black uppercase tracking-tighter italic leading-none">
                                    MASTER <span className="text-orange-500 orange-glow-text">CONTROL</span>
                                </h1>
                                <div className="flex items-center gap-4 mt-4 ml-1">
                                    <span className="text-[10px] uppercase tracking-[0.5em] opacity-30">Arche v5.0 Stable</span>
                                    <div className="h-[1px] w-20 bg-orange-500/20"></div>
                                </div>
                            </div>
                            
                            <div className="flex bg-white/5 p-1.5 rounded-[2rem] border border-white/5 shadow-2xl">
                                <button onClick={() => {setView('dashboard'); setEditingId(null);}} className={`px-12 py-5 rounded-[1.5rem] text-[11px] font-black uppercase tracking-[0.3em] transition-all ${view === 'dashboard' && !editingId ? 'bg-orange-600 text-white shadow-lg' : 'opacity-40 hover:opacity-100'}`}>Aufnahme</button>
                                <button onClick={() => setView('archive')} className={`px-12 py-5 rounded-[1.5rem] text-[11px] font-black uppercase tracking-[0.3em] transition-all ${view === 'archive' ? 'bg-orange-600 text-white shadow-lg' : 'opacity-40 hover:opacity-100'}`}>Archiv</button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                            
                            {/* LINKS: VERZEICHNIS (TOC) */}
                            <aside className="lg:col-span-4 space-y-6">
                                <div className="glass p-8 rounded-[3rem] border-white/5 orange-glow sticky top-10">
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="text-[11px] font-black uppercase tracking-widest opacity-40">Verzeichnis</h2>
                                        <button onClick={copyTOC} className="text-orange-500 hover:text-orange-400 flex items-center gap-2 group transition-all active:scale-90">
                                            <span className="text-[10px] font-black uppercase tracking-widest group-hover:mr-1 transition-all">Log Kopieren</span>
                                            <LucideIcon name="copy" size={14} />
                                        </button>
                                    </div>

                                    {/* Archive Toggle in TOC */}
                                    <div className="flex gap-2 mb-8 p-1 bg-black/40 rounded-2xl border border-white/5">
                                        <button onClick={() => setArchiveMode('xposts')} className={`flex-1 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all ${archiveMode === 'xposts' ? 'bg-white/10 opacity-100' : 'opacity-20 hover:opacity-50'}`}>X-Posts</button>
                                        <button onClick={() => setArchiveMode('resonanz')} className={`flex-1 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all ${archiveMode === 'resonanz' ? 'bg-white/10 opacity-100' : 'opacity-20 hover:opacity-50'}`}>Resonanz</button>
                                    </div>

                                    <div className="relative mb-6">
                                        <input 
                                            className="w-full bg-black/40 border border-white/5 p-4 pl-12 rounded-2xl text-xs outline-none focus:border-orange-500 font-bold transition-all italic"
                                            placeholder="ARCHE FILTERN..."
                                            value={search}
                                            onChange={e => setSearch(e.target.value)}
                                        />
                                        <LucideIcon name="search" size={14} className="absolute left-4 top-4.5 opacity-20" />
                                    </div>

                                    <div className="space-y-2 max-h-[50vh] overflow-y-auto custom-scroll pr-2">
                                        {filteredEntries.map(e => (
                                            <button 
                                                key={e.id}
                                                onClick={() => {
                                                    setView('archive');
                                                    setExpandedId(e.id);
                                                    setTimeout(() => {
                                                        document.getElementById(`entry-${e.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                                    }, 100);
                                                }}
                                                className={`w-full text-left p-5 rounded-2xl transition-all flex items-center gap-4 border ${expandedId === e.id ? 'bg-orange-600/10 border-orange-500/30' : 'bg-white/0 border-transparent hover:bg-white/5'}`}
                                            >
                                                <span className="tab-font text-[10px] font-bold text-orange-500/60 min-w-[35px]">#{e.tabNumber}</span>
                                                <span className={`text-[11px] font-black uppercase truncate flex-1 ${expandedId === e.id ? 'text-orange-500' : 'opacity-40'}`}>{e.title}</span>
                                                {archiveMode === 'xposts' && (
                                                    <div className={`w-1.5 h-1.5 rounded-full ${e.xStatus === 'sent' ? 'bg-green-500' : e.xStatus === 'warning' ? 'bg-red-500' : 'bg-white/10'}`}></div>
                                                )}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </aside>

                            {/* RECHTS: ARBEITSBEREICH */}
                            <main className="lg:col-span-8">
                                {view === 'dashboard' || editingId ? (
                                    <div className="glass p-12 rounded-[4rem] border-orange-500/10 orange-glow animate-fade">
                                        <div className="flex justify-between items-center mb-10">
                                            <h2 className="text-xl font-black uppercase tracking-[0.3em] text-orange-500 italic">
                                                {editingId ? 'Eintrag Editieren' : 'Neuer Vektor'}
                                            </h2>
                                            {editingId && (
                                                <button onClick={() => {setEditingId(null); setFormData({title:'', content:'', xStatus:'standby', tabNumber:'', type:'xposts'});}} className="text-[10px] font-black uppercase opacity-40 hover:opacity-100 flex items-center gap-2">
                                                    Abbrechen <LucideIcon name="x" size={14} />
                                                </button>
                                            )}
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                            <div className="space-y-2">
                                                <label className="text-[9px] font-black uppercase tracking-widest opacity-20 ml-2">Bereich</label>
                                                <select className="w-full bg-black/40 border border-white/5 p-5 rounded-3xl outline-none focus:border-orange-500 text-[10px] font-black uppercase appearance-none cursor-pointer" value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})}>
                                                    <option value="xposts">X-Post Archiv</option>
                                                    <option value="resonanz">Resonanz-Tab</option>
                                                </select>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[9px] font-black uppercase tracking-widest opacity-20 ml-2">Tab Nummer</label>
                                                <input className="w-full bg-black/40 border border-white/5 p-5 rounded-3xl outline-none focus:border-orange-500 font-bold tab-font text-orange-500 text-lg" placeholder="000" value={formData.tabNumber} onChange={e => setFormData({...formData, tabNumber: e.target.value})} />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[9px] font-black uppercase tracking-widest opacity-20 ml-2">X-Status</label>
                                                <select className="w-full bg-black/40 border border-white/5 p-5 rounded-3xl outline-none focus:border-orange-500 text-[10px] font-black uppercase appearance-none cursor-pointer" value={formData.xStatus} onChange={e => setFormData({...formData, xStatus: e.target.value})}>
                                                    <option value="standby">⚪ Standby</option>
                                                    <option value="sent">🟢 Sent (X)</option>
                                                    <option value="warning">🔴 Warning</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div className="space-y-2 mb-8">
                                            <label className="text-[9px] font-black uppercase tracking-widest opacity-20 ml-2">Resonanz-Thema</label>
                                            <input className="w-full bg-black/40 border border-white/5 p-8 rounded-[2.5rem] outline-none focus:border-orange-500 font-black text-4xl uppercase tracking-tighter italic" placeholder="TITEL..." value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                        </div>

                                        <div className="space-y-2 mb-4">
                                            <label className="text-[9px] font-black uppercase tracking-widest opacity-20 ml-2">Inhalt</label>
                                            <textarea className="w-full bg-black/40 border border-white/5 p-10 rounded-[3.5rem] h-[550px] outline-none focus:border-orange-500 transition-all resize-none leading-relaxed text-2xl italic font-light no-scrollbar" placeholder="Der Atemzug aus Licht..." value={formData.content} onChange={e => setFormData({...formData, content: e.target.value})}></textarea>
                                        </div>

                                        <div className="flex gap-4 mb-10">
                                            <button onClick={addSeparator} className="px-8 py-4 bg-white/5 border border-white/5 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition-all flex items-center gap-3">
                                                <LucideIcon name="minus" size={14} /> Trennlinie einfügen
                                            </button>
                                        </div>

                                        <button onClick={handleSave} className="w-full bg-orange-600 py-10 rounded-[3rem] font-black uppercase tracking-[0.8em] hover:scale-[1.01] active:scale-[0.98] transition-all text-2xl shadow-2xl shadow-orange-900/40">
                                            {editingId ? 'Aktualisieren' : 'Speichern 4-2-6'}
                                        </button>
                                    </div>
                                ) : (
                                    <div className="space-y-8 pb-40 animate-fade">
                                        <div className="flex justify-between items-center px-8 mb-4">
                                            <h2 className="text-2xl font-black uppercase tracking-[0.2em] italic opacity-40">
                                                {archiveMode === 'xposts' ? 'X-Post Archiv' : 'Resonanz Archiv'}
                                            </h2>
                                            <span className="text-[10px] font-black uppercase opacity-20 tracking-widest">Akkordeon-Modus Aktiv</span>
                                        </div>
                                        
                                        {filteredEntries.length === 0 && (
                                            <div className="glass p-20 rounded-[4rem] text-center opacity-20 border-dashed border-white/10">
                                                <LucideIcon name="database" size={48} className="mx-auto mb-6" />
                                                <p className="text-sm font-black uppercase tracking-widest">Keine Daten in diesem Vektor</p>
                                            </div>
                                        )}

                                        {filteredEntries.map(e => (
                                            <div key={e.id} id={`entry-${e.id}`} className={`glass rounded-[4rem] overflow-hidden border transition-all duration-700 ${expandedId === e.id ? 'border-orange-500/40 orange-glow shadow-2xl' : 'border-white/5'}`}>
                                                <button onClick={() => setExpandedId(expandedId === e.id ? null : e.id)} className="w-full p-12 flex items-center justify-between text-left group">
                                                    <div className="flex items-center gap-10">
                                                        <span className="tab-font text-3xl font-black italic opacity-10 group-hover:opacity-100 transition-all duration-500">#{e.tabNumber}</span>
                                                        <h3 className={`text-4xl font-black uppercase tracking-tighter italic transition-all duration-500 ${expandedId === e.id ? 'text-orange-500' : 'group-hover:text-orange-400'}`}>
                                                            {e.title}
                                                        </h3>
                                                    </div>
                                                    <div className="flex items-center gap-8">
                                                        {archiveMode === 'xposts' && (
                                                            <div className={`w-3 h-3 rounded-full transition-all duration-700 ${e.xStatus === 'sent' ? 'bg-green-500 shadow-[0_0_15px_rgba(34,197,94,0.5)]' : e.xStatus === 'warning' ? 'bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]' : 'bg-slate-800'}`}></div>
                                                        )}
                                                        <LucideIcon name={expandedId === e.id ? "chevron-up" : "chevron-down"} className={`transition-all duration-500 ${expandedId === e.id ? 'text-orange-500 rotate-180' : 'opacity-10'}`} />
                                                    </div>
                                                </button>

                                                {expandedId === e.id && (
                                                    <div className="px-16 pb-16 animate-fade">
                                                        <div className="h-[1px] w-1/3 bg-orange-500/30 mb-12"></div>
                                                        
                                                        {/* Actions Bar */}
                                                        <div className="flex gap-4 mb-12">
                                                            <button onClick={() => copySingle(e)} className="flex items-center gap-2 px-6 py-3 bg-white/5 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-orange-600/20 hover:text-orange-500 transition-all">
                                                                <LucideIcon name="copy" size={14} /> Kopieren
                                                            </button>
                                                            <button onClick={() => startEdit(e)} className="flex items-center gap-2 px-6 py-3 bg-white/5 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-600/20 hover:text-blue-400 transition-all">
                                                                <LucideIcon name="edit" size={14} /> Editieren
                                                            </button>
                                                            <button onClick={() => deleteEntry(e.id)} className="flex items-center gap-2 px-6 py-3 bg-white/5 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-red-600/20 hover:text-red-500 transition-all ml-auto">
                                                                <LucideIcon name="trash-2" size={14} /> Löschen
                                                            </button>
                                                        </div>

                                                        <div className="content-display text-slate-200 text-2xl italic font-light leading-relaxed">
                                                            {e.content.split('--------------------').map((part, idx, arr) => (
                                                                <React.Fragment key={idx}>
                                                                    {part}
                                                                    {idx < arr.length - 1 && (
                                                                        <div className="my-12 flex items-center gap-4 opacity-20">
                                                                            <div className="h-[1px] flex-1 bg-white"></div>
                                                                            <span className="text-[10px] font-black uppercase tracking-[1em] ml-4">Vector-Break</span>
                                                                            <div className="h-[1px] flex-1 bg-white"></div>
                                                                        </div>
                                                                    )}
                                                                </React.Fragment>
                                                            ))}
                                                        </div>

                                                        <div className="mt-20 pt-10 border-t border-white/5 opacity-20 text-[9px] font-black uppercase tracking-[0.4em] flex justify-between">
                                                            <span>Erschaffen: {e.createdAt}</span>
                                                            <span className="tab-font">Hash: {e.id.substring(0,12)}</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </main>
                        </div>
                    </div>

                    <footer className="mt-60 pb-24 text-center opacity-5 tracking-[2em] text-[11px] font-black uppercase">
                        Igel Füchsin Blindschleiche aus Licht
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
