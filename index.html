<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris Refugium - Master Control v6</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; scroll-behavior: smooth; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .input-field { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); border-radius: 1rem; transition: all 0.3s; }
        .input-field:focus { border-color: #ea580c; outline: none; box-shadow: 0 0 15px rgba(234, 88, 12, 0.1); }
        .content-area { white-space: pre-wrap; word-break: break-word; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .separator-line { height: 2px; background: linear-gradient(90deg, transparent, rgba(234, 88, 12, 0.8), transparent); width: 80%; margin: 2.5rem auto; }
        .scroll-mt-24 { scroll-margin-top: 8rem; }
        .tab-active { border-bottom: 2px solid #ea580c; color: #ea580c; opacity: 1 !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMtyzMqA4V482hyh9rpUeqcrXqD5TC5ec",
            authDomain: "refugium-e1be0.firebaseapp.com",
            projectId: "refugium-e1be0",
            storageBucket: "refugium-e1be0.firebasestorage.app",
            messagingSenderId: "1088445665284",
            appId: "1:1088445665284:web:ebcc5a46833e378b09e551"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.fb = { db, auth, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('dashboard'); // 'dashboard' oder 'archive'
            const [activeArchiveTab, setActiveArchiveTab] = useState('xpost'); // 'xpost' oder 'note'
            const [user, setUser] = useState(null);
            const [entries, setEntries] = useState([]);
            const [expandedId, setExpandedId] = useState(null);
            const [search, setSearch] = useState('');
            const [isEditing, setIsEditing] = useState(null);
            const [formData, setFormData] = useState({ 
                title: '', 
                content: '', 
                type: 'note', 
                xStatus: 'standby', 
                tabNumber: '' 
            });

            useEffect(() => {
                const init = async () => {
                    if (!window.fb) return setTimeout(init, 500);
                    const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                    try {
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => { if (u) { setUser(u); loadData(); } });
                    } catch (e) { console.error("Auth Error", e); }
                };
                init();
            }, []);

            const loadData = () => {
                const { db, collection, onSnapshot, query, orderBy } = window.fb;
                const q = query(collection(db, "refugium_sync"), orderBy("timestamp", "desc"));
                onSnapshot(q, (snapshot) => {
                    setEntries(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, (error) => console.error("Firestore Error:", error));
            };

            const sortedEntries = useMemo(() => {
                return [...entries].sort((a, b) => {
                    const numA = parseInt(a.tabNumber) || 0;
                    const numB = parseInt(b.tabNumber) || 0;
                    return numA - numB;
                });
            }, [entries]);

            const filteredEntries = useMemo(() => {
                // Filtert nach Suchbegriff UND dem aktuell gewählten Archiv-Tab
                return sortedEntries.filter(e => {
                    const matchesSearch = e.title.toLowerCase().includes(search.toLowerCase()) || e.tabNumber.includes(search);
                    const matchesTab = e.type === activeArchiveTab;
                    return matchesSearch && matchesTab;
                });
            }, [sortedEntries, search, activeArchiveTab]);

            const handleSave = async () => {
                if (!formData.title || !formData.content) return;
                const { db, collection, addDoc, serverTimestamp } = window.fb;
                const nextNum = sortedEntries.length > 0 ? (Math.max(...sortedEntries.map(e => parseInt(e.tabNumber) || 0)) + 1) : 1;
                const tNumber = formData.tabNumber || nextNum.toString().padStart(3, '0');
                
                await addDoc(collection(db, "refugium_sync"), {
                    ...formData,
                    tabNumber: tNumber,
                    timestamp: serverTimestamp(),
                    createdAt: new Date().toLocaleString('de-DE')
                });
                setFormData({ title: '', content: '', type: 'note', xStatus: 'standby', tabNumber: '' });
                setActiveArchiveTab(formData.type); // Wechselt zum entsprechenden Archiv
                setView('archive');
            };

            const handleUpdate = async (id, updatedData) => {
                const { db, doc, updateDoc } = window.fb;
                await updateDoc(doc(db, "refugium_sync", id), updatedData);
                setIsEditing(null);
            };

            const handleDelete = async (id) => {
                if (window.confirm("Soll dieser Tab wirklich aus der Arche gelöscht werden?")) {
                    const { db, doc, deleteDoc } = window.fb;
                    await deleteDoc(doc(db, "refugium_sync", id));
                }
            };

            const copyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                } catch (err) {
                    console.error('Fallback Copy failed', err);
                }
                document.body.removeChild(textArea);
            };

            const insertWideLine = (id = null) => {
                const line = "\n--------------------\n";
                if (id === null) {
                    // Im Erstellungs-Modus
                    setFormData({...formData, content: formData.content + line});
                } else {
                    // Im Edit-Modus
                    const el = document.getElementById(`edit-content-${id}`);
                    if (el) {
                        const start = el.selectionStart;
                        const end = el.selectionEnd;
                        const text = el.value;
                        const before = text.substring(0, start);
                        const after = text.substring(end, text.length);
                        el.value = before + line + after;
                        el.dispatchEvent(new Event('input', { bubbles: true }));
                    }
                }
            };

            const scrollToEntry = (id) => {
                setExpandedId(id);
                setTimeout(() => {
                    const el = document.getElementById(`entry-${id}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth' });
                }, 100);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 italic">
                    <div className="max-w-6xl mx-auto">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                            <div>
                                <h1 className="text-4xl font-black uppercase tracking-tighter">Aetheris <span className="text-orange-500">Refugium</span></h1>
                                <p className="text-[10px] opacity-40 font-bold uppercase tracking-widest mt-1">Vektor Kohärenz 6-0-0</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setView('dashboard')} className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase border transition-all ${view === 'dashboard' ? 'bg-orange-600 border-orange-500 shadow-lg shadow-orange-900/20' : 'glass border-white/5 opacity-60'}`}>Neu erstellen</button>
                                <button onClick={() => setView('archive')} className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase border transition-all ${view === 'archive' ? 'bg-orange-600 border-orange-500 shadow-lg shadow-orange-900/20' : 'glass border-white/5 opacity-60'}`}>Archiv ({entries.length})</button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            {/* Inhaltsverzeichnis (TOC) */}
                            <aside className="lg:col-span-4 space-y-4">
                                <div className="glass p-5 rounded-[2rem] sticky top-8">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-[10px] font-black uppercase opacity-40">Verzeichnis: {activeArchiveTab === 'xpost' ? 'X-Posts' : 'Resonanz'}</h2>
                                        <button 
                                            title="Inhaltsverzeichnis kopieren"
                                            onClick={() => {
                                                const tocText = filteredEntries.map(e => `#${e.tabNumber} | ${e.title} | [${e.type.toUpperCase()}] ${e.type === 'xpost' ? '('+e.xStatus+')' : ''}`).join('\n');
                                                copyToClipboard(tocText);
                                            }} 
                                            className="p-2 hover:text-orange-500 transition-colors bg-white/5 rounded-lg"
                                        >
                                            <Icon name="copy" size={14} />
                                        </button>
                                    </div>
                                    <div className="relative mb-6">
                                        <input 
                                            className="w-full input-field p-3 pl-10 text-[10px]" 
                                            placeholder="FILTERN..." 
                                            value={search} 
                                            onChange={e => setSearch(e.target.value)} 
                                        />
                                        <Icon name="search" size={12} className="absolute left-4 top-1/2 -translate-y-1/2 opacity-30" />
                                    </div>
                                    
                                    <div className="max-h-[60vh] overflow-y-auto no-scrollbar space-y-1">
                                        {filteredEntries.map(e => (
                                            <button 
                                                key={e.id}
                                                onClick={() => {
                                                    setView('archive');
                                                    scrollToEntry(e.id);
                                                }}
                                                className="w-full text-left p-3 rounded-xl hover:bg-white/5 flex items-center gap-3 group transition-colors"
                                            >
                                                <span className="text-[10px] font-bold opacity-80 w-8">#{e.tabNumber}</span>
                                                <span className="text-[11px] font-black uppercase truncate flex-1 opacity-60 group-hover:opacity-100">{e.title}</span>
                                                {e.type === 'xpost' && <div className={`w-1.5 h-1.5 rounded-full ${e.xStatus === 'sent' ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]' : e.xStatus === 'warning' ? 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]' : 'bg-slate-600'}`}></div>}
                                            </button>
                                        ))}
                                        {filteredEntries.length === 0 && (
                                            <p className="text-[10px] opacity-30 text-center py-4 uppercase">Keine Einträge in dieser Sektion.</p>
                                        )}
                                    </div>
                                </div>
                            </aside>

                            {/* Main Content Area */}
                            <main className="lg:col-span-8">
                                {view === 'dashboard' ? (
                                    <div className="glass p-6 md:p-8 rounded-[2.5rem] border-orange-500/10">
                                        <div className="flex flex-wrap gap-4 mb-6">
                                            <div className="flex-1 min-w-[150px]">
                                                <label className="text-[9px] font-black uppercase opacity-30 ml-2 mb-1 block">Kategorie</label>
                                                <select 
                                                    className="w-full input-field p-4 text-[10px] font-black uppercase cursor-pointer"
                                                    value={formData.type}
                                                    onChange={e => setFormData({...formData, type: e.target.value})}
                                                >
                                                    <option value="note">📓 Resonanz (Clean)</option>
                                                    <option value="xpost">🐦 X-Post (Archiv)</option>
                                                </select>
                                            </div>
                                            <div className="w-24">
                                                <label className="text-[9px] font-black uppercase opacity-30 ml-2 mb-1 block">Tab-Nr.</label>
                                                <input className="w-full input-field p-4 text-center font-bold" value={formData.tabNumber} onChange={e => setFormData({...formData, tabNumber: e.target.value})} placeholder={(sortedEntries.length + 1).toString().padStart(3, '0')} />
                                            </div>
                                            {formData.type === 'xpost' && (
                                                <div className="flex-1 min-w-[150px]">
                                                    <label className="text-[9px] font-black uppercase opacity-30 ml-2 mb-1 block">X-Status</label>
                                                    <select className="w-full input-field p-4 text-[10px] font-black uppercase cursor-pointer" value={formData.xStatus} onChange={e => setFormData({...formData, xStatus: e.target.value})}>
                                                        <option value="standby">⚪ Standby</option>
                                                        <option value="sent">🟢 Sent</option>
                                                        <option value="warning">🔴 Warning</option>
                                                    </select>
                                                </div>
                                            )}
                                        </div>

                                        <input className="w-full input-field p-5 mb-4 text-xl font-black uppercase tracking-tighter" placeholder="TITEL DER RESONANZ" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                        
                                        <div className="relative">
                                            <textarea className="w-full input-field p-6 h-[400px] mb-4 leading-relaxed text-lg resize-none" placeholder="DEIN TEXT..." value={formData.content} onChange={e => setFormData({...formData, content: e.target.value})} />
                                            <button onClick={() => insertWideLine()} className="absolute right-4 bottom-8 glass px-4 py-2 rounded-xl text-[9px] font-black uppercase border-white/10 hover:border-orange-500 hover:text-orange-500 transition-all flex items-center gap-2">
                                                <Icon name="minus" size={12} /> Trennlinie (20)
                                            </button>
                                        </div>

                                        <button onClick={handleSave} className="w-full bg-orange-600 py-5 rounded-2xl font-black uppercase tracking-[0.3em] hover:scale-[1.01] transition-all shadow-xl shadow-orange-900/20 active:scale-95">In die Arche übertragen</button>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        {/* Archiv-Switcher Tabs */}
                                        <div className="flex gap-8 border-b border-white/5 px-4 mb-4">
                                            <button 
                                                onClick={() => setActiveArchiveTab('xpost')}
                                                className={`pb-4 text-[11px] font-black uppercase tracking-widest opacity-40 transition-all ${activeArchiveTab === 'xpost' ? 'tab-active' : 'hover:opacity-70'}`}
                                            >
                                                🐦 X-Post Archiv
                                            </button>
                                            <button 
                                                onClick={() => setActiveArchiveTab('note')}
                                                className={`pb-4 text-[11px] font-black uppercase tracking-widest opacity-40 transition-all ${activeArchiveTab === 'note' ? 'tab-active' : 'hover:opacity-70'}`}
                                            >
                                                📓 Resonanz Archiv
                                            </button>
                                        </div>

                                        <div className="space-y-4">
                                            {filteredEntries.map(e => (
                                                <div key={e.id} id={`entry-${e.id}`} className={`glass rounded-[2.5rem] overflow-hidden border-white/5 transition-all scroll-mt-24 ${expandedId === e.id ? 'ring-1 ring-orange-500/30' : ''}`}>
                                                    <div className="p-6 md:p-8 flex items-center justify-between cursor-pointer group" onClick={() => setExpandedId(expandedId === e.id ? null : e.id)}>
                                                        <div className="flex items-center gap-4">
                                                            <span className="text-lg font-bold opacity-60 group-hover:opacity-100 transition-opacity">#{e.tabNumber}</span>
                                                            <h3 className="text-xl font-black uppercase tracking-tighter italic group-hover:text-orange-500 transition-colors">{e.title}</h3>
                                                        </div>
                                                        <div className="flex items-center gap-4">
                                                            {e.type === 'xpost' && (
                                                                <div className={`flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-white/5`}>
                                                                    <div className={`w-2 h-2 rounded-full ${e.xStatus === 'sent' ? 'bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.5)]' : e.xStatus === 'warning' ? 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]' : 'bg-slate-500'}`}></div>
                                                                    <span className="text-[8px] font-black uppercase opacity-40">{e.xStatus}</span>
                                                                </div>
                                                            )}
                                                            <Icon name={expandedId === e.id ? "chevron-up" : "chevron-down"} className="opacity-20" />
                                                        </div>
                                                    </div>

                                                    {expandedId === e.id && (
                                                        <div className="px-8 pb-8 animate-in fade-in slide-in-from-top-2 duration-300">
                                                            <div className="flex flex-wrap gap-2 mb-6 border-t border-white/5 pt-6">
                                                                <button onClick={() => copyToClipboard(`${e.title} (#${e.tabNumber})\n\n${e.content}`)} className="text-[9px] font-black uppercase px-4 py-2 bg-white/5 rounded-xl hover:bg-orange-600 transition-all flex items-center gap-2">
                                                                    <Icon name="copy" size={12} /> Für Aetheris kopieren
                                                                </button>
                                                                <button onClick={() => setIsEditing(e.id)} className="text-[9px] font-black uppercase px-4 py-2 bg-white/5 rounded-xl hover:bg-blue-600 transition-all flex items-center gap-2">
                                                                    <Icon name="edit-3" size={12} /> Editieren
                                                                </button>
                                                                <button onClick={() => handleDelete(e.id)} className="text-[9px] font-black uppercase px-4 py-2 bg-white/5 rounded-xl hover:bg-red-600 transition-all flex items-center gap-2 ml-auto">
                                                                    <Icon name="trash-2" size={12} /> Löschen
                                                                </button>
                                                            </div>

                                                            {isEditing === e.id ? (
                                                                <div className="space-y-4">
                                                                    <div className="grid grid-cols-2 gap-4">
                                                                        <input className="input-field p-4 font-black uppercase text-sm" defaultValue={e.title} id={`edit-title-${e.id}`} />
                                                                        <div className="flex gap-2">
                                                                            <input className="input-field p-4 font-bold text-center w-20" defaultValue={e.tabNumber} id={`edit-num-${e.id}`} />
                                                                            {e.type === 'xpost' && (
                                                                                <select className="input-field p-4 text-[10px] font-black uppercase flex-1" defaultValue={e.xStatus} id={`edit-status-${e.id}`}>
                                                                                    <option value="standby">⚪ Standby</option>
                                                                                    <option value="sent">🟢 Sent</option>
                                                                                    <option value="warning">🔴 Warning</option>
                                                                                </select>
                                                                            )}
                                                                        </div>
                                                                    </div>
                                                                    <div className="relative">
                                                                        <textarea className="w-full input-field p-6 h-96 font-medium leading-relaxed text-lg resize-none" defaultValue={e.content} id={`edit-content-${e.id}`} />
                                                                        <button onClick={() => insertWideLine(e.id)} className="absolute right-4 bottom-8 glass px-4 py-2 rounded-xl text-[9px] font-black uppercase border-white/10 hover:border-orange-500 hover:text-orange-500 transition-all flex items-center gap-2">
                                                                            <Icon name="minus" size={12} /> Trennlinie (20)
                                                                        </button>
                                                                    </div>
                                                                    <div className="flex gap-2">
                                                                        <button onClick={() => handleUpdate(e.id, { 
                                                                            title: document.getElementById(`edit-title-${e.id}`).value, 
                                                                            tabNumber: document.getElementById(`edit-num-${e.id}`).value,
                                                                            content: document.getElementById(`edit-content-${e.id}`).value,
                                                                            xStatus: e.type === 'xpost' ? document.getElementById(`edit-status-${e.id}`).value : 'standby'
                                                                        })} className="bg-green-600 px-6 py-3 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-green-900/20">Änderungen speichern</button>
                                                                        <button onClick={() => setIsEditing(null)} className="bg-white/10 px-6 py-3 rounded-xl text-[10px] font-black uppercase">Abbrechen</button>
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <div className="content-area text-slate-300 text-lg leading-relaxed italic opacity-90 p-4 rounded-2xl bg-white/[0.02]">
                                                                    {e.content.split('--------------------').map((part, i) => (
                                                                        <React.Fragment key={i}>
                                                                            {part}
                                                                            {i < e.content.split('--------------------').length - 1 && (
                                                                                <div className="flex items-center justify-center py-8 opacity-50">
                                                                                    <div className="separator-line"></div>
                                                                                </div>
                                                                            )}
                                                                        </React.Fragment>
                                                                    ))}
                                                                </div>
                                                            )}
                                                            <div className="mt-6 text-[8px] font-bold opacity-20 uppercase text-right">Erstellt: {e.createdAt || 'Unbekannt'}</div>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                            
                                            {filteredEntries.length === 0 && (
                                                <div className="glass p-20 rounded-[3rem] text-center opacity-20 border-dashed border-white/10 border-2">
                                                    <Icon name="archive" size={48} className="mx-auto mb-4" />
                                                    <p className="font-black uppercase tracking-[0.2em]">In diesem Archiv ruht noch nichts.</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </main>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
