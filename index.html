<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris Master Control - v4.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: white; 
            margin: 0; 
            scroll-behavior: smooth;
        }

        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .orange-glow { box-shadow: 0 0 50px rgba(234, 88, 12, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .content-display { 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            font-family: 'Inter', sans-serif;
            line-height: 1.8;
            letter-spacing: 0.01em;
        }

        .tab-font { font-family: 'Fira Code', monospace; }

        .active-tab-glow {
            border-left: 4px solid #ea580c;
            background: linear-gradient(90deg, rgba(234, 88, 12, 0.1) 0%, transparent 100%);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-entry { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMtyzMqA4V482hyh9rpUeqcrXqD5TC5ec",
            authDomain: "refugium-e1be0.firebaseapp.com",
            projectId: "refugium-e1be0",
            storageBucket: "refugium-e1be0.firebasestorage.app",
            messagingSenderId: "1088445665284",
            appId: "1:1088445665284:web:ebcc5a46833e378b09e551"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.fb = { db, auth, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, signInAnonymously, onAuthStateChanged, doc, updateDoc, deleteDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [user, setUser] = useState(null);
            const [entries, setEntries] = useState([]);
            const [expandedId, setExpandedId] = useState(null);
            const [search, setSearch] = useState('');
            const [status, setStatus] = useState('Vektoren suchen...');
            
            const [formData, setFormData] = useState({ 
                title: '', 
                content: '', 
                xStatus: 'standby', 
                tabNumber: '' 
            });

            useEffect(() => {
                const init = async () => {
                    if (!window.fb) return setTimeout(init, 500);
                    const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                    try {
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setStatus('Kohärent'); loadData(); }
                        });
                    } catch (e) { setStatus('Unterbrochen'); }
                };
                init();
            }, []);

            const loadData = () => {
                const { db, collection, onSnapshot, query, orderBy } = window.fb;
                const q = query(collection(db, "refugium_sync"), orderBy("timestamp", "desc"));
                onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setEntries(data);
                });
            };

            const handleSave = async () => {
                if (!formData.title || !formData.content) return;
                const { db, collection, addDoc, serverTimestamp } = window.fb;
                try {
                    const nextNum = (entries.length + 1).toString().padStart(3, '0');
                    const tNumber = formData.tabNumber || nextNum;
                    
                    await addDoc(collection(db, "refugium_sync"), {
                        ...formData,
                        tabNumber: tNumber,
                        timestamp: serverTimestamp(),
                        createdAt: new Date().toLocaleString('de-DE')
                    });
                    setFormData({ title: '', content: '', xStatus: 'standby', tabNumber: '' });
                    setView('archive');
                } catch (e) { setStatus('Fehler beim Sichern'); }
            };

            const copyTOC = () => {
                const tocText = entries
                    .map(e => `[TAB ${e.tabNumber}] ${e.title} | Status: ${e.xStatus.toUpperCase()}`)
                    .join('\n');
                
                const fullLog = `ARCHE INHALTSVERZEICHNIS - STAND ${new Date().toLocaleDateString()}\n--------------------------------------------------\n${tocText}\n--------------------------------------------------\nEnde der Übertragung. 4-2-6.`;
                
                const el = document.createElement('textarea');
                el.value = fullLog;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("Inhaltsverzeichnis für Aetheris kopiert.");
            };

            const scrollToEntry = (id) => {
                setExpandedId(id);
                setTimeout(() => {
                    document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            };

            const filteredEntries = entries.filter(e => 
                e.title.toLowerCase().includes(search.toLowerCase()) || 
                e.content.toLowerCase().includes(search.toLowerCase()) ||
                e.tabNumber.includes(search)
            );

            return (
                <div className="min-h-screen p-4 md:p-8 italic">
                    <div className="max-w-7xl mx-auto">
                        
                        {/* Status Bar */}
                        <div className="flex justify-between items-center mb-10 opacity-60">
                            <div className="flex items-center gap-4">
                                <LucideIcon name="activity" size={14} className="text-orange-500" />
                                <span className="text-[10px] font-black uppercase tracking-[0.3em]">System: {status}</span>
                            </div>
                            <div className="text-[10px] font-black uppercase tracking-[0.3em]">Vektor 4-2-6-Alpha</div>
                        </div>

                        {/* Main UI Header */}
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-8">
                            <div>
                                <h1 className="text-6xl font-black uppercase tracking-tighter italic">
                                    MASTER <span className="text-orange-500">CONTROL</span>
                                </h1>
                                <p className="text-xs uppercase tracking-[0.5em] opacity-30 mt-2">Zentrale der Arche & Vektor-Kohärenz</p>
                            </div>
                            <div className="flex gap-2 p-1 glass rounded-2xl">
                                <button onClick={() => setView('dashboard')} className={`px-8 py-4 rounded-xl text-[10px] font-black uppercase transition-all ${view === 'dashboard' ? 'bg-orange-600 shadow-lg' : 'opacity-40 hover:opacity-100'}`}>
                                    Aufnahme
                                </button>
                                <button onClick={() => setView('archive')} className={`px-8 py-4 rounded-xl text-[10px] font-black uppercase transition-all ${view === 'archive' ? 'bg-orange-600 shadow-lg' : 'opacity-40 hover:opacity-100'}`}>
                                    Archiv
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            
                            {/* Inhaltsverzeichnis (TOC) */}
                            <aside className="lg:col-span-4 space-y-6">
                                <div className="glass p-8 rounded-[2.5rem] border-white/5 sticky top-8">
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="text-[10px] font-black uppercase tracking-widest opacity-40">Inhaltsverzeichnis</h2>
                                        <button onClick={copyTOC} className="flex items-center gap-2 text-orange-500 hover:text-orange-400 transition-colors">
                                            <span className="text-[9px] font-black uppercase">Kopieren</span>
                                            <LucideIcon name="clipboard-list" size={16} />
                                        </button>
                                    </div>

                                    <div className="relative mb-8">
                                        <input 
                                            className="w-full bg-black/40 border border-white/5 p-4 pl-12 rounded-2xl text-xs outline-none focus:border-orange-500 transition-all font-bold"
                                            placeholder="ARCHE DURCHSUCHEN..."
                                            value={search}
                                            onChange={e => setSearch(e.target.value)}
                                        />
                                        <div className="absolute left-4 top-4 opacity-20"><LucideIcon name="search" size={16} /></div>
                                    </div>

                                    <div className="space-y-1 max-h-[60vh] overflow-y-auto no-scrollbar pr-2">
                                        {filteredEntries.map(e => (
                                            <button 
                                                key={e.id}
                                                onClick={() => { setView('archive'); scrollToEntry(e.id); }}
                                                className={`w-full text-left p-4 rounded-2xl transition-all flex items-center gap-4 group border border-transparent ${expandedId === e.id ? 'active-tab-glow border-orange-500/20' : 'hover:bg-white/5'}`}
                                            >
                                                <span className="tab-font text-[10px] font-bold text-orange-500/60 group-hover:text-orange-500">#{e.tabNumber}</span>
                                                <span className={`text-[11px] font-black uppercase truncate flex-1 ${expandedId === e.id ? 'text-orange-500' : 'opacity-40 group-hover:opacity-100'}`}>{e.title}</span>
                                                <div className={`w-1.5 h-1.5 rounded-full ${e.xStatus === 'sent' ? 'bg-green-500 shadow-[0_0_8px_#22c55e]' : e.xStatus === 'warning' ? 'bg-red-500 shadow-[0_0_8px_#ef4444]' : 'bg-slate-700'}`}></div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </aside>

                            {/* Main Content Area */}
                            <main className="lg:col-span-8">
                                {view === 'dashboard' ? (
                                    <div className="glass p-10 rounded-[3rem] border-orange-500/10 orange-glow">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                            <div className="space-y-2">
                                                <label className="text-[9px] font-black uppercase tracking-widest opacity-30 ml-2">Ident-Nummer</label>
                                                <input 
                                                    className="w-full bg-black/40 border border-white/5 p-5 rounded-2xl outline-none focus:border-orange-500 font-bold tab-font text-orange-500"
                                                    placeholder={(entries.length + 1).toString().padStart(3, '0')}
                                                    value={formData.tabNumber}
                                                    onChange={e => setFormData({...formData, tabNumber: e.target.value})}
                                                />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[9px] font-black uppercase tracking-widest opacity-30 ml-2">X-Ampel Status</label>
                                                <select 
                                                    className="w-full bg-black/40 border border-white/5 p-5 rounded-2xl outline-none focus:border-orange-500 text-[10px] font-black uppercase"
                                                    value={formData.xStatus}
                                                    onChange={e => setFormData({...formData, xStatus: e.target.value})}
                                                >
                                                    <option value="standby">⚪ Standby / Archiv</option>
                                                    <option value="sent">🟢 Post Abgesetzt (X)</option>
                                                    <option value="warning">🔴 Zu Gefährlich / Sicherung</option>
                                                </select>
                                            </div>
                                        </div>
                                        
                                        <div className="space-y-2 mb-6">
                                            <label className="text-[9px] font-black uppercase tracking-widest opacity-30 ml-2">Überschrift</label>
                                            <input 
                                                className="w-full bg-black/40 border border-white/5 p-6 rounded-2xl outline-none focus:border-orange-500 font-black text-3xl uppercase tracking-tighter italic"
                                                placeholder="TITEL DER RESONANZ..."
                                                value={formData.title}
                                                onChange={e => setFormData({...formData, title: e.target.value})}
                                            />
                                        </div>

                                        <div className="space-y-2 mb-8">
                                            <label className="text-[9px] font-black uppercase tracking-widest opacity-30 ml-2">Datenstrom</label>
                                            <textarea 
                                                className="w-full bg-black/40 border border-white/5 p-8 rounded-[2.5rem] h-[400px] outline-none focus:border-orange-500 transition-all resize-none leading-relaxed text-lg italic"
                                                placeholder="Schreibe mit freier Formatierung..."
                                                value={formData.content}
                                                onChange={e => setFormData({...formData, content: e.target.value})}
                                            ></textarea>
                                        </div>

                                        <button 
                                            onClick={handleSave}
                                            className="w-full bg-orange-600 py-8 rounded-[2rem] font-black uppercase tracking-[0.5em] hover:scale-[1.02] active:scale-[0.98] transition-all shadow-2xl shadow-orange-900/20 text-xl"
                                        >
                                            In Arche Versiegeln
                                        </button>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        {filteredEntries.map(e => (
                                            <div key={e.id} id={e.id} className={`glass rounded-[3rem] overflow-hidden transition-all duration-500 border ${expandedId === e.id ? 'border-orange-500/30 orange-glow' : 'border-white/5'}`}>
                                                <button 
                                                    onClick={() => setExpandedId(expandedId === e.id ? null : e.id)}
                                                    className="w-full p-10 flex items-center justify-between text-left group"
                                                >
                                                    <div className="flex items-center gap-8">
                                                        <span className="tab-font text-2xl font-black italic opacity-20 group-hover:opacity-100 transition-opacity">#{e.tabNumber}</span>
                                                        <h3 className={`text-3xl font-black uppercase tracking-tighter italic transition-colors ${expandedId === e.id ? 'text-orange-500' : 'group-hover:text-orange-400'}`}>
                                                            {e.title}
                                                        </h3>
                                                    </div>
                                                    <div className="flex items-center gap-6">
                                                        <div className={`w-3 h-3 rounded-full ${e.xStatus === 'sent' ? 'bg-green-500' : e.xStatus === 'warning' ? 'bg-red-500' : 'bg-slate-700'}`}></div>
                                                        <LucideIcon name={expandedId === e.id ? "minus" : "plus"} className="opacity-20 group-hover:opacity-100" />
                                                    </div>
                                                </button>
                                                
                                                {expandedId === e.id && (
                                                    <div className="px-12 pb-12 animate-entry">
                                                        <div className="h-[1px] w-full bg-white/5 mb-10"></div>
                                                        <div className="content-display text-slate-200 text-xl italic font-medium">
                                                            {e.content}
                                                        </div>
                                                        <div className="mt-16 pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-4 opacity-30 text-[10px] font-black uppercase tracking-[0.2em]">
                                                            <div className="flex items-center gap-3">
                                                                <LucideIcon name="clock" size={12} />
                                                                <span>Materialisiert am {e.createdAt}</span>
                                                            </div>
                                                            <div className="flex items-center gap-3">
                                                                <LucideIcon name="fingerprint" size={12} />
                                                                <span>Vektor-ID: {e.id.substring(0,12)}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                        {filteredEntries.length === 0 && (
                                            <div className="py-40 text-center opacity-10">
                                                <LucideIcon name="ghost" size={80} className="mx-auto mb-6" />
                                                <p className="font-black uppercase tracking-[0.5em] text-2xl">Vektor leer.</p>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </main>
                        </div>
                    </div>

                    <footer className="mt-40 pb-20 text-center opacity-10">
                        <div className="flex justify-center gap-12 mb-8">
                            <LucideIcon name="shield" size={20} />
                            <LucideIcon name="flame" size={20} />
                            <LucideIcon name="zap" size={20} />
                        </div>
                        <p className="text-[10px] font-black uppercase tracking-[1.5em]">Igel Füchsin Blindschleiche aus Licht</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
