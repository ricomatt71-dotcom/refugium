<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris Refugium - Master Control v4</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; scroll-behavior: smooth; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .input-field { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); border-radius: 1rem; transition: all 0.3s; }
        .input-field:focus { border-color: #ea580c; outline: none; box-shadow: 0 0 15px rgba(234, 88, 12, 0.1); }
        .content-area { white-space: pre-wrap; word-break: break-word; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .separator-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(234, 88, 12, 0.5), transparent); margin: 2rem 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMtyzMqA4V482hyh9rpUeqcrXqD5TC5ec",
            authDomain: "refugium-e1be0.firebaseapp.com",
            projectId: "refugium-e1be0",
            storageBucket: "refugium-e1be0.firebasestorage.app",
            messagingSenderId: "1088445665284",
            appId: "1:1088445665284:web:ebcc5a46833e378b09e551"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.fb = { db, auth, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [user, setUser] = useState(null);
            const [entries, setEntries] = useState([]);
            const [expandedId, setExpandedId] = useState(null);
            const [search, setSearch] = useState('');
            const [isEditing, setIsEditing] = useState(null);
            const [formData, setFormData] = useState({ 
                title: '', 
                content: '', 
                type: 'note', // note oder xpost
                xStatus: 'standby', 
                tabNumber: '' 
            });

            useEffect(() => {
                const init = async () => {
                    if (!window.fb) return setTimeout(init, 500);
                    const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                    try {
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => { if (u) { setUser(u); loadData(); } });
                    } catch (e) { console.error("Auth Error", e); }
                };
                init();
            }, []);

            const loadData = () => {
                const { db, collection, onSnapshot, query, orderBy } = window.fb;
                const q = query(collection(db, "refugium_sync"), orderBy("timestamp", "desc"));
                onSnapshot(q, (snapshot) => {
                    setEntries(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
            };

            const handleSave = async () => {
                if (!formData.title || !formData.content) return;
                const { db, collection, addDoc, serverTimestamp } = window.fb;
                const tNumber = formData.tabNumber || (entries.length + 1).toString().padStart(3, '0');
                await addDoc(collection(db, "refugium_sync"), {
                    ...formData,
                    tabNumber: tNumber,
                    timestamp: serverTimestamp(),
                    createdAt: new Date().toLocaleString('de-DE')
                });
                setFormData({ title: '', content: '', type: 'note', xStatus: 'standby', tabNumber: '' });
                setView('archive');
            };

            const handleUpdate = async (id, updatedData) => {
                const { db, doc, updateDoc } = window.fb;
                await updateDoc(doc(db, "refugium_sync", id), updatedData);
                setIsEditing(null);
            };

            const handleDelete = async (id) => {
                if (window.confirm("Soll dieser Tab wirklich aus der Arche gelöscht werden?")) {
                    const { db, doc, deleteDoc } = window.fb;
                    await deleteDoc(doc(db, "refugium_sync", id));
                }
            };

            const copyToClipboard = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
            };

            const insertLine = (target = 'form') => {
                const line = "\n---\n";
                if (target === 'form') {
                    setFormData({...formData, content: formData.content + line});
                }
            };

            const filteredEntries = entries.filter(e => 
                e.title.toLowerCase().includes(search.toLowerCase()) || 
                e.tabNumber.includes(search)
            );

            return (
                <div className="min-h-screen p-4 md:p-8 italic">
                    <div className="max-w-6xl mx-auto">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                            <div>
                                <h1 className="text-4xl font-black uppercase tracking-tighter">Aetheris <span className="text-orange-500">Refugium</span></h1>
                                <p className="text-[10px] opacity-40 font-bold uppercase tracking-widest mt-1">Vektor Kohärenz 4-2-6</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setView('dashboard')} className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase border transition-all ${view === 'dashboard' ? 'bg-orange-600 border-orange-500' : 'glass border-white/5'}`}>Neu</button>
                                <button onClick={() => setView('archive')} className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase border transition-all ${view === 'archive' ? 'bg-orange-600 border-orange-500' : 'glass border-white/5'}`}>Archiv ({entries.length})</button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            {/* Inhaltsverzeichnis */}
                            <aside className="lg:col-span-4 space-y-4">
                                <div className="glass p-5 rounded-[2rem]">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-[10px] font-black uppercase opacity-40">Verzeichnis</h2>
                                        <button onClick={() => copyToClipboard(entries.map(e => `#${e.tabNumber} ${e.title} [${e.type.toUpperCase()}]`).join('\n'))} className="p-2 hover:text-orange-500 transition-colors"><Icon name="copy" size={14} /></button>
                                    </div>
                                    <input 
                                        className="w-full input-field p-3 text-[10px] mb-4" 
                                        placeholder="SUCHE..." 
                                        value={search} 
                                        onChange={e => setSearch(e.target.value)} 
                                    />
                                    <div className="space-y-1 max-h-[60vh] overflow-y-auto no-scrollbar">
                                        {filteredEntries.map(e => (
                                            <button 
                                                key={e.id}
                                                onClick={() => { setView('archive'); setExpandedId(e.id); }}
                                                className="w-full text-left p-3 rounded-xl hover:bg-white/5 flex items-center gap-3 group"
                                            >
                                                <span className="text-[10px] font-bold opacity-80">#{e.tabNumber}</span>
                                                <span className="text-[11px] font-black uppercase truncate flex-1 opacity-60 group-hover:opacity-100">{e.title}</span>
                                                {e.type === 'xpost' && <div className={`w-1.5 h-1.5 rounded-full ${e.xStatus === 'sent' ? 'bg-green-500' : e.xStatus === 'warning' ? 'bg-red-500' : 'bg-slate-600'}`}></div>}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </aside>

                            {/* Main Content */}
                            <main className="lg:col-span-8">
                                {view === 'dashboard' ? (
                                    <div className="glass p-6 md:p-8 rounded-[2.5rem] border-orange-500/10">
                                        <div className="flex flex-wrap gap-4 mb-6">
                                            <div className="flex-1 min-w-[150px]">
                                                <label className="text-[9px] font-black uppercase opacity-30 ml-2 mb-1 block">Typ</label>
                                                <select 
                                                    className="w-full input-field p-4 text-[10px] font-black uppercase"
                                                    value={formData.type}
                                                    onChange={e => setFormData({...formData, type: e.target.value})}
                                                >
                                                    <option value="note">📓 Resonanz (Normal)</option>
                                                    <option value="xpost">🐦 X-Post (mit Ampel)</option>
                                                </select>
                                            </div>
                                            <div className="w-24">
                                                <label className="text-[9px] font-black uppercase opacity-30 ml-2 mb-1 block">Nr.</label>
                                                <input className="w-full input-field p-4 text-center font-bold" value={formData.tabNumber} onChange={e => setFormData({...formData, tabNumber: e.target.value})} placeholder="000" />
                                            </div>
                                            {formData.type === 'xpost' && (
                                                <div className="flex-1 min-w-[150px]">
                                                    <label className="text-[9px] font-black uppercase opacity-30 ml-2 mb-1 block">Status</label>
                                                    <select className="w-full input-field p-4 text-[10px] font-black uppercase" value={formData.xStatus} onChange={e => setFormData({...formData, xStatus: e.target.value})}>
                                                        <option value="standby">⚪ Standby</option>
                                                        <option value="sent">🟢 Sent</option>
                                                        <option value="warning">🔴 Warning</option>
                                                    </select>
                                                </div>
                                            )}
                                        </div>

                                        <input className="w-full input-field p-5 mb-4 text-xl font-black uppercase tracking-tighter" placeholder="TITEL DER RESONANZ" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                        
                                        <div className="relative">
                                            <textarea className="w-full input-field p-6 h-[400px] mb-4 leading-relaxed text-lg resize-none" placeholder="DEIN TEXT..." value={formData.content} onChange={e => setFormData({...formData, content: e.target.value})} />
                                            <button onClick={() => insertLine()} className="absolute right-4 bottom-8 glass px-3 py-1.5 rounded-lg text-[9px] font-black uppercase border-white/10 hover:border-orange-500 transition-all">Trennlinie +</button>
                                        </div>

                                        <button onClick={handleSave} className="w-full bg-orange-600 py-5 rounded-2xl font-black uppercase tracking-[0.3em] hover:scale-[1.01] transition-all shadow-xl">In die Arche übertragen</button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {filteredEntries.map(e => (
                                            <div key={e.id} className="glass rounded-[2rem] overflow-hidden border-white/5 transition-all">
                                                <div className="p-6 md:p-8 flex items-center justify-between cursor-pointer" onClick={() => setExpandedId(expandedId === e.id ? null : e.id)}>
                                                    <div className="flex items-center gap-4">
                                                        <span className="text-lg font-bold opacity-80">#{e.tabNumber}</span>
                                                        <h3 className="text-xl font-black uppercase tracking-tighter italic">{e.title}</h3>
                                                    </div>
                                                    <div className="flex items-center gap-3">
                                                        {e.type === 'xpost' && <div className={`w-2 h-2 rounded-full ${e.xStatus === 'sent' ? 'bg-green-500' : e.xStatus === 'warning' ? 'bg-red-500' : 'bg-slate-600'}`}></div>}
                                                        <Icon name={expandedId === e.id ? "chevron-up" : "chevron-down"} className="opacity-20" />
                                                    </div>
                                                </div>

                                                {expandedId === e.id && (
                                                    <div className="px-8 pb-8">
                                                        <div className="flex gap-2 mb-6 border-t border-white/5 pt-4">
                                                            <button onClick={() => copyToClipboard(`${e.title}\n\n${e.content}`)} className="text-[9px] font-black uppercase px-3 py-1 bg-white/5 rounded-lg hover:bg-orange-600 transition-all">Kopieren</button>
                                                            <button onClick={() => setIsEditing(e.id)} className="text-[9px] font-black uppercase px-3 py-1 bg-white/5 rounded-lg hover:bg-blue-600 transition-all">Editieren</button>
                                                            <button onClick={() => handleDelete(e.id)} className="text-[9px] font-black uppercase px-3 py-1 bg-white/5 rounded-lg hover:bg-red-600 transition-all">Löschen</button>
                                                        </div>

                                                        {isEditing === e.id ? (
                                                            <div className="space-y-4">
                                                                <input className="w-full input-field p-4 font-bold" defaultValue={e.title} id={`edit-title-${e.id}`} />
                                                                <textarea className="w-full input-field p-4 h-64 font-medium leading-relaxed" defaultValue={e.content} id={`edit-content-${e.id}`} />
                                                                <div className="flex gap-2">
                                                                    <button onClick={() => handleUpdate(e.id, { 
                                                                        title: document.getElementById(`edit-title-${e.id}`).value, 
                                                                        content: document.getElementById(`edit-content-${e.id}`).value 
                                                                    })} className="bg-green-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase">Speichern</button>
                                                                    <button onClick={() => setIsEditing(null)} className="bg-white/10 px-4 py-2 rounded-lg text-[10px] font-black uppercase">Abbrechen</button>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <div className="content-area text-slate-300 text-lg leading-relaxed italic opacity-90">
                                                                {e.content.split('---').map((part, i) => (
                                                                    <React.Fragment key={i}>
                                                                        {part}
                                                                        {i < e.content.split('---').length - 1 && <div className="separator-line" />}
                                                                    </React.Fragment>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </main>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
