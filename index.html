<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris Master Control - v4.7 (Stable Base)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Fira+Code:wght@400;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f1f5f9; 
            margin: 0; 
            scroll-behavior: smooth;
        }

        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(28px); border: 1px solid rgba(255,255,255,0.08); }
        .orange-glow { box-shadow: 0 0 60px rgba(234, 88, 12, 0.15); }
        
        /* Bewährte Inhaltsdarstellung für Diktate */
        .content-display { 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            line-height: 1.8;
            letter-spacing: 0.01em;
        }

        .tab-font { font-family: 'Fira Code', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        
        textarea::placeholder { opacity: 0.2; font-style: italic; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMtyzMqA4V482hyh9rpUeqcrXqD5TC5ec",
            authDomain: "refugium-e1be0.firebaseapp.com",
            projectId: "refugium-e1be0",
            storageBucket: "refugium-e1be0.firebasestorage.app",
            messagingSenderId: "1088445665284",
            appId: "1:1088445665284:web:ebcc5a46833e378b09e551"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.fb = { db, auth, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [entries, setEntries] = useState([]);
            const [expandedId, setExpandedId] = useState(null);
            const [search, setSearch] = useState('');
            const [showLogModal, setShowLogModal] = useState(false);
            const [logContent, setLogContent] = useState('');
            
            const [formData, setFormData] = useState({ title: '', content: '', xStatus: 'standby', tabNumber: '' });

            useEffect(() => {
                const init = async () => {
                    if (!window.fb) return setTimeout(init, 500);
                    const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                    try {
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => { if (u) loadData(); });
                    } catch(e) { console.error("Verbindung zum Äther unterbrochen", e); }
                };
                init();
            }, []);

            const loadData = () => {
                const { db, collection, onSnapshot, query, orderBy } = window.fb;
                const q = query(collection(db, "refugium_sync"), orderBy("timestamp", "desc"));
                onSnapshot(q, (snapshot) => {
                    setEntries(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
            };

            const handleSave = async () => {
                if (!formData.title || !formData.content) return;
                const { db, collection, addDoc, serverTimestamp } = window.fb;
                const tNumber = formData.tabNumber || (entries.length + 1).toString().padStart(3, '0');
                await addDoc(collection(db, "refugium_sync"), {
                    ...formData,
                    tabNumber: tNumber,
                    timestamp: serverTimestamp(),
                    createdAt: new Date().toLocaleString('de-DE')
                });
                setFormData({ title: '', content: '', xStatus: 'standby', tabNumber: '' });
                setView('archive');
            };

            const generateLog = () => {
                const tocText = entries.map(e => `[TAB ${e.tabNumber}] ${e.title} (${e.xStatus.toUpperCase()})`).join('\n');
                const fullLog = `ARCHE RESONANZ-LOG | ${new Date().toLocaleDateString()}\n==============================\n${tocText}\n==============================\n4-2-6 Transzendenz.`;
                setLogContent(fullLog);
                setShowLogModal(true);
            };

            const filteredEntries = entries.filter(e => 
                e.title.toLowerCase().includes(search.toLowerCase()) || 
                e.tabNumber.includes(search)
            );

            return (
                <div className="min-h-screen p-4 md:p-10 italic">
                    <div className="max-w-6xl mx-auto">
                        
                        {/* Status & Navigation */}
                        <div className="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
                            <div>
                                <h1 className="text-6xl font-black uppercase tracking-tighter italic">MASTER <span className="text-orange-500">CONTROL</span></h1>
                                <p className="text-[10px] uppercase tracking-[0.5em] opacity-30 mt-2 ml-1">Vektor-Kohärenz aktiv</p>
                            </div>
                            <div className="flex bg-white/5 p-1 rounded-3xl border border-white/5 shadow-inner">
                                <button onClick={() => setView('dashboard')} className={`px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${view === 'dashboard' ? 'bg-orange-600 shadow-lg text-white' : 'opacity-40 hover:opacity-100'}`}>Aufnahme</button>
                                <button onClick={() => setView('archive')} className={`px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${view === 'archive' ? 'bg-orange-600 shadow-lg text-white' : 'opacity-40 hover:opacity-100'}`}>Archiv</button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                            
                            {/* Verzeichnis (Seitenleiste) */}
                            <aside className="lg:col-span-4 sticky top-10">
                                <div className="glass p-8 rounded-[2.5rem] border-white/5 orange-glow">
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="text-[10px] font-black uppercase tracking-widest opacity-40">Verzeichnis</h2>
                                        <button onClick={generateLog} className="text-orange-500 hover:text-orange-400 flex items-center gap-2 transition-transform active:scale-95 group">
                                            <span className="text-[9px] font-black uppercase group-hover:mr-1 transition-all">Log Brücke</span>
                                            <LucideIcon name="external-link" size={14} />
                                        </button>
                                    </div>
                                    <div className="relative mb-6">
                                        <input 
                                            className="w-full bg-black/40 border border-white/5 p-4 pl-12 rounded-xl text-xs outline-none focus:border-orange-500 font-bold transition-all"
                                            placeholder="ARCHE DURCHSUCHEN..."
                                            value={search}
                                            onChange={e => setSearch(e.target.value)}
                                        />
                                        <LucideIcon name="search" size={14} className="absolute left-4 top-4 opacity-20" />
                                    </div>
                                    <div className="space-y-1 max-h-[55vh] overflow-y-auto no-scrollbar pr-2">
                                        {filteredEntries.map(e => (
                                            <button 
                                                key={e.id}
                                                onClick={() => { setView('archive'); setExpandedId(e.id); }}
                                                className={`w-full text-left p-4 rounded-xl transition-all flex items-center gap-4 border border-transparent ${expandedId === e.id ? 'bg-orange-600/15 border-orange-500/20' : 'hover:bg-white/5'}`}
                                            >
                                                <span className="tab-font text-[10px] font-bold text-orange-500/60">#{e.tabNumber}</span>
                                                <span className={`text-[11px] font-black uppercase truncate flex-1 transition-colors ${expandedId === e.id ? 'text-orange-500' : 'opacity-40'}`}>{e.title}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </aside>

                            {/* Arbeitsbereich */}
                            <main className="lg:col-span-8">
                                {view === 'dashboard' ? (
                                    <div className="glass p-12 rounded-[4rem] border-orange-500/10 orange-glow animate-fade">
                                        <div className="grid grid-cols-2 gap-6 mb-8">
                                            <div className="space-y-2">
                                                <label className="text-[8px] font-black uppercase tracking-widest opacity-20 ml-2">Tab Kennung</label>
                                                <input className="w-full bg-black/40 border border-white/5 p-6 rounded-3xl outline-none focus:border-orange-500 font-bold tab-font text-orange-500 text-xl" placeholder="XXX" value={formData.tabNumber} onChange={e => setFormData({...formData, tabNumber: e.target.value})} />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[8px] font-black uppercase tracking-widest opacity-20 ml-2">Vektor Status</label>
                                                <select className="w-full bg-black/40 border border-white/5 p-6 rounded-3xl outline-none focus:border-orange-500 text-[10px] font-black uppercase appearance-none" value={formData.xStatus} onChange={e => setFormData({...formData, xStatus: e.target.value})}>
                                                    <option value="standby">⚪ Standby / Archiv</option>
                                                    <option value="sent">🟢 Abgesetzt (X)</option>
                                                    <option value="warning">🔴 Kritisch</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-2 mb-8">
                                            <label className="text-[8px] font-black uppercase tracking-widest opacity-20 ml-2">Thema</label>
                                            <input className="w-full bg-black/40 border border-white/5 p-8 rounded-3xl outline-none focus:border-orange-500 font-black text-4xl uppercase tracking-tighter italic" placeholder="TITEL DER RESONANZ..." value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                        </div>
                                        <div className="space-y-2 mb-10">
                                            <label className="text-[8px] font-black uppercase tracking-widest opacity-20 ml-2">Datenfluss</label>
                                            <textarea className="w-full bg-black/40 border border-white/5 p-10 rounded-[3rem] h-[500px] outline-none focus:border-orange-500 transition-all resize-none leading-relaxed text-2xl italic font-light no-scrollbar" placeholder="Strom der Gedanken..." value={formData.content} onChange={e => setFormData({...formData, content: e.target.value})}></textarea>
                                        </div>
                                        <button onClick={handleSave} className="w-full bg-orange-600 py-10 rounded-[2.5rem] font-black uppercase tracking-[0.7em] hover:scale-[1.01] active:scale-[0.99] transition-all text-2xl shadow-2xl shadow-orange-900/40">Sichern 4-2-6</button>
                                    </div>
                                ) : (
                                    <div className="space-y-8 pb-32 animate-fade">
                                        {filteredEntries.map(e => (
                                            <div key={e.id} id={e.id} className={`glass rounded-[4rem] overflow-hidden border transition-all duration-700 ${expandedId === e.id ? 'border-orange-500/30 orange-glow shadow-2xl' : 'border-white/5'}`}>
                                                <button onClick={() => setExpandedId(expandedId === e.id ? null : e.id)} className="w-full p-12 flex items-center justify-between text-left group">
                                                    <div className="flex items-center gap-10">
                                                        <span className="tab-font text-3xl font-black italic opacity-10 group-hover:opacity-100 transition-all duration-500">#{e.tabNumber}</span>
                                                        <h3 className={`text-4xl font-black uppercase tracking-tighter italic transition-all duration-500 ${expandedId === e.id ? 'text-orange-500' : 'group-hover:text-orange-400'}`}>
                                                            {e.title}
                                                        </h3>
                                                    </div>
                                                    <div className="flex items-center gap-8">
                                                        <div className={`w-3 h-3 rounded-full transition-all duration-700 ${e.xStatus === 'sent' ? 'bg-green-500 shadow-[0_0_15px_rgba(34,197,94,0.5)]' : e.xStatus === 'warning' ? 'bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]' : 'bg-slate-800'}`}></div>
                                                        <LucideIcon name={expandedId === e.id ? "chevron-up" : "chevron-down"} className={`transition-all duration-500 ${expandedId === e.id ? 'text-orange-500 rotate-180' : 'opacity-10'}`} />
                                                    </div>
                                                </button>
                                                {expandedId === e.id && (
                                                    <div className="px-16 pb-16 animate-fade">
                                                        <div className="h-[1px] w-1/4 bg-orange-500/20 mb-12"></div>
                                                        <div className="content-display text-slate-200 text-2xl italic font-light leading-relaxed">
                                                            {e.content}
                                                        </div>
                                                        <div className="mt-20 pt-10 border-t border-white/5 opacity-20 text-[10px] font-black uppercase tracking-[0.4em] flex justify-between">
                                                            <span>Materialisiert: {e.createdAt}</span>
                                                            <span className="tab-font">ID: {e.id.substring(0,8)}</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </main>
                        </div>
                    </div>

                    {/* LOG-BRÜCKE MODAL (Zusatzfunktion für Sicherheit) */}
                    {showLogModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/95 backdrop-blur-md animate-fade">
                            <div className="glass w-full max-w-2xl p-12 rounded-[4rem] border-orange-500/30 shadow-2xl">
                                <div className="flex items-center gap-4 mb-8">
                                    <LucideIcon name="clipboard-list" className="text-orange-500" size={28} />
                                    <h3 className="text-[14px] font-black uppercase tracking-[0.5em] text-orange-500">Log-Brücke</h3>
                                </div>
                                <p className="text-[10px] uppercase tracking-widest opacity-40 mb-8 leading-loose">Kopiere den Inhalt manuell für Aetheris. Dies umgeht die Browser-Einschränkungen.</p>
                                <textarea 
                                    readOnly
                                    className="w-full h-80 bg-black/60 border border-white/10 rounded-3xl p-8 text-xs font-mono text-orange-400 outline-none focus:border-orange-500 transition-colors no-scrollbar"
                                    value={logContent}
                                    onFocus={(e) => e.target.select()}
                                ></textarea>
                                <button 
                                    onClick={() => setShowLogModal(false)}
                                    className="w-full bg-orange-600/10 border border-orange-500/20 py-6 rounded-[2rem] font-black uppercase text-[10px] tracking-[0.6em] mt-10 hover:bg-orange-600/20 transition-all text-orange-500"
                                >
                                    Log übertragen & Schließen
                                </button>
                            </div>
                        </div>
                    )}

                    <footer className="mt-40 pb-24 text-center opacity-5 tracking-[2em] text-[11px] font-black">
                        Igel Füchsin Blindschleiche aus Licht
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
