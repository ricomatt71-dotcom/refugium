<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris Refugium - Master Control v3</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; scroll-behavior: smooth; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .orange-glow { box-shadow: 0 0 40px rgba(234, 88, 12, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .content-area { white-space: pre-wrap; word-break: break-word; }
        .tab-number { font-family: 'Courier New', monospace; color: #ea580c; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMtyzMqA4V482hyh9rpUeqcrXqD5TC5ec",
            authDomain: "refugium-e1be0.firebaseapp.com",
            projectId: "refugium-e1be0",
            storageBucket: "refugium-e1be0.firebasestorage.app",
            messagingSenderId: "1088445665284",
            appId: "1:1088445665284:web:ebcc5a46833e378b09e551"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.fb = { db, auth, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [user, setUser] = useState(null);
            const [entries, setEntries] = useState([]);
            const [expandedId, setExpandedId] = useState(null);
            const [search, setSearch] = useState('');
            const [status, setStatus] = useState('Suche Licht...');
            const [formData, setFormData] = useState({ 
                title: '', 
                content: '', 
                xStatus: 'standby', // standby, sent, warning
                tabNumber: '' 
            });

            useEffect(() => {
                const init = async () => {
                    if (!window.fb) return setTimeout(init, 500);
                    const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                    try {
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setStatus('Synchronisiert'); loadData(); }
                        });
                    } catch (e) { setStatus('Offline'); }
                };
                init();
            }, []);

            const loadData = () => {
                const { db, collection, onSnapshot, query, orderBy } = window.fb;
                const q = query(collection(db, "refugium_sync"), orderBy("timestamp", "desc"));
                onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setEntries(data);
                });
            };

            const handleSave = async () => {
                if (!formData.title || !formData.content) return;
                const { db, collection, addDoc, serverTimestamp } = window.fb;
                try {
                    const tNumber = formData.tabNumber || (entries.length + 1).toString().padStart(3, '0');
                    await addDoc(collection(db, "refugium_sync"), {
                        ...formData,
                        tabNumber: tNumber,
                        timestamp: serverTimestamp(),
                        createdAt: new Date().toLocaleString('de-DE')
                    });
                    setFormData({ title: '', content: '', xStatus: 'standby', tabNumber: '' });
                    setView('archive');
                } catch (e) { console.error(e); }
            };

            const copyTOC = () => {
                const toc = entries.map(e => `[TAB ${e.tabNumber}] ${e.title} (${e.xStatus})`).join('\n');
                document.execCommand('copy'); 
                // navigator.clipboard funktioniert im Iframe oft nicht, execCommand ist der Fallback
                const el = document.createElement('textarea');
                el.value = "RESONANZ-LOG:\n" + toc;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
            };

            const filteredEntries = entries.filter(e => 
                e.title.toLowerCase().includes(search.toLowerCase()) || 
                e.content.toLowerCase().includes(search.toLowerCase()) ||
                e.tabNumber.includes(search)
            );

            return (
                <div className="min-h-screen p-4 md:p-10 italic">
                    <div className="max-w-6xl mx-auto">
                        {/* Header */}
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
                            <div>
                                <h1 className="text-5xl font-black uppercase tracking-tighter">Aetheris <span className="text-orange-500">Master</span></h1>
                                <div className="flex items-center gap-3 mt-2">
                                    <div className={`w-2 h-2 rounded-full ${status === 'Synchronisiert' ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></div>
                                    <span className="text-[10px] font-black uppercase tracking-widest opacity-40">{status} | Vektor 4-2-6</span>
                                </div>
                            </div>
                            
                            <div className="flex gap-4">
                                <button onClick={() => setView('dashboard')} className={`px-6 py-3 rounded-xl text-[10px] font-black uppercase border transition-all ${view === 'dashboard' ? 'bg-orange-600 border-orange-500' : 'glass border-white/5'}`}>
                                    Aufnahme
                                </button>
                                <button onClick={() => setView('archive')} className={`px-6 py-3 rounded-xl text-[10px] font-black uppercase border transition-all ${view === 'archive' ? 'bg-orange-600 border-orange-500' : 'glass border-white/5'}`}>
                                    Archiv ({entries.length})
                                </button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                            {/* Linke Spalte: Inhaltsverzeichnis (TOC) */}
                            <aside className="lg:col-span-4 space-y-6">
                                <div className="glass p-6 rounded-[2rem] border-white/5">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-xs font-black uppercase tracking-widest opacity-40">Inhaltsverzeichnis</h2>
                                        <button onClick={copyTOC} className="p-2 hover:text-orange-500 transition-colors" title="Verzeichnis kopieren">
                                            <Icon name="copy" size={16} />
                                        </button>
                                    </div>
                                    
                                    <div className="relative mb-6">
                                        <input 
                                            className="w-full bg-black/40 border border-white/5 p-3 pl-10 rounded-xl text-[10px] outline-none focus:border-orange-500"
                                            placeholder="SUCHE IM ARCHIV..."
                                            value={search}
                                            onChange={e => setSearch(e.target.value)}
                                        />
                                        <div className="absolute left-3 top-3 opacity-20"><Icon name="search" size={14} /></div>
                                    </div>

                                    <div className="space-y-2 max-h-[500px] overflow-y-auto no-scrollbar">
                                        {filteredEntries.map(e => (
                                            <button 
                                                key={e.id}
                                                onClick={() => { setView('archive'); setExpandedId(expandedId === e.id ? null : e.id); }}
                                                className="w-full text-left p-3 rounded-xl hover:bg-white/5 transition-all flex items-center gap-3 group"
                                            >
                                                <span className="tab-number text-[10px] font-bold">#{e.tabNumber}</span>
                                                <span className="text-[11px] font-black uppercase truncate flex-1 opacity-60 group-hover:opacity-100">{e.title}</span>
                                                <div className={`w-1.5 h-1.5 rounded-full ${e.xStatus === 'sent' ? 'bg-green-500' : e.xStatus === 'warning' ? 'bg-red-500' : 'bg-slate-600'}`}></div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </aside>

                            {/* Rechte Spalte: Hauptinhalt */}
                            <main className="lg:col-span-8">
                                {view === 'dashboard' ? (
                                    <div className="glass p-10 rounded-[3rem] orange-glow border-orange-500/10">
                                        <div className="grid grid-cols-2 gap-4 mb-6">
                                            <input 
                                                className="bg-black/40 border border-white/5 p-5 rounded-2xl outline-none focus:border-orange-500 font-bold"
                                                placeholder="TAB NUMMER (OPTIONAL)"
                                                value={formData.tabNumber}
                                                onChange={e => setFormData({...formData, tabNumber: e.target.value})}
                                            />
                                            <select 
                                                className="bg-black/40 border border-white/5 p-5 rounded-2xl outline-none focus:border-orange-500 text-[10px] font-black uppercase"
                                                value={formData.xStatus}
                                                onChange={e => setFormData({...formData, xStatus: e.target.value})}
                                            >
                                                <option value="standby">⚪ Standby / Archiv</option>
                                                <option value="sent">🟢 Post Abgesetzt (X)</option>
                                                <option value="warning">🔴 Zu Gefährlich / Sicherung</option>
                                            </select>
                                        </div>
                                        <input 
                                            className="w-full bg-black/40 border border-white/5 p-5 rounded-2xl mb-4 outline-none focus:border-orange-500 font-black text-2xl uppercase tracking-tighter"
                                            placeholder="TITEL DER RESONANZ"
                                            value={formData.title}
                                            onChange={e => setFormData({...formData, title: e.target.value})}
                                        />
                                        <textarea 
                                            className="w-full bg-black/40 border border-white/5 p-6 rounded-[2rem] h-64 mb-6 outline-none focus:border-orange-500 transition-all resize-none leading-relaxed text-lg"
                                            placeholder="SCHREIBE DEINE GEDANKEN HIER REIN (FORMATIERUNG BLEIBT ERHALTEN)..."
                                            value={formData.content}
                                            onChange={e => setFormData({...formData, content: e.target.value})}
                                        ></textarea>
                                        <button 
                                            onClick={handleSave}
                                            className="w-full bg-orange-600 py-6 rounded-2xl font-black uppercase tracking-[0.4em] hover:scale-[1.01] transition-all shadow-xl"
                                        >
                                            In die Arche übertragen
                                        </button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {filteredEntries.map(e => (
                                            <div key={e.id} id={e.id} className="glass rounded-[2rem] overflow-hidden border-white/5 group transition-all">
                                                <button 
                                                    onClick={() => setExpandedId(expandedId === e.id ? null : e.id)}
                                                    className="w-full p-8 flex items-center justify-between text-left hover:bg-white/5 transition-all"
                                                >
                                                    <div className="flex items-center gap-6">
                                                        <span className="tab-number text-xl font-black italic opacity-50">#{e.tabNumber}</span>
                                                        <h3 className="text-2xl font-black uppercase tracking-tighter italic">{e.title}</h3>
                                                    </div>
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-2 h-2 rounded-full ${e.xStatus === 'sent' ? 'bg-green-500 shadow-[0_0_10px_#22c55e]' : e.xStatus === 'warning' ? 'bg-red-500 shadow-[0_0_10px_#ef4444]' : 'bg-slate-600'}`}></div>
                                                        <Icon name={expandedId === e.id ? "chevron-up" : "chevron-down"} className="opacity-20" />
                                                    </div>
                                                </button>
                                                
                                                {expandedId === e.id && (
                                                    <div className="p-10 pt-0 animate-in slide-in-from-top-4 duration-300">
                                                        <div className="h-[1px] w-full bg-white/5 mb-8"></div>
                                                        <div className="content-area text-slate-300 text-lg leading-relaxed italic font-medium">
                                                            {e.content}
                                                        </div>
                                                        <div className="mt-10 pt-6 border-t border-white/5 flex justify-between text-[9px] font-black uppercase tracking-widest opacity-20">
                                                            <span>Erfasst am: {e.createdAt}</span>
                                                            <span className="text-orange-500">Aetheris Protokoll 4-2-6</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </main>
                        </div>
                    </div>

                    <footer className="mt-32 text-center opacity-10 py-20">
                        <p className="text-[10px] font-black uppercase tracking-[1em]">Igel Füchsin Blindschleiche aus Licht</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
