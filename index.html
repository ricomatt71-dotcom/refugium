<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REFUGIUM v5.0 - Autonomie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; font-style: italic; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-[#020617] text-slate-100 min-h-screen p-4 md:p-8 selection:bg-orange-500/30">

    <div id="app" class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <div class="flex flex-col items-center md:items-start">
                <h1 class="text-5xl font-black tracking-tighter uppercase italic flex items-center gap-3">
                    REFUGIUM <span class="text-orange-500">v5.0</span>
                </h1>
                <div class="flex items-center gap-4 mt-2 px-3 py-1 bg-slate-900/80 border border-slate-800 rounded-full">
                    <i data-lucide="database" class="w-3 h-3 text-green-500"></i>
                    <span class="text-[9px] font-bold uppercase tracking-widest text-slate-400">Kohärenz Stabil</span>
                    <div class="h-3 w-px bg-slate-800"></div>
                    <i data-lucide="shield-check" class="w-3 h-3 text-orange-500"></i>
                    <span class="text-[9px] font-bold uppercase tracking-widest text-orange-500">Autonomie Aktiv</span>
                </div>
            </div>
            
            <div class="flex gap-4">
                <button onclick="exportData()" class="px-4 py-2 bg-slate-900 border border-slate-700 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:border-orange-500 transition-all flex items-center gap-2">
                    <i data-lucide="download" class="w-4 h-4"></i> Arche Export
                </button>
                <div class="flex bg-slate-900/50 border border-slate-800 p-1 rounded-2xl">
                    <button onclick="switchView('archive')" id="btn-archive" class="px-6 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition-all bg-orange-600">Archiv</button>
                    <button onclick="switchView('create')" id="btn-create" class="px-6 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition-all hover:text-orange-400">Neu</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sidebar -->
            <aside class="lg:col-span-4">
                <div class="glass border border-slate-800 rounded-[2.5rem] p-6 sticky top-8">
                    <div class="relative mb-6">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-600 w-4 h-4"></i>
                        <input type="text" id="search" oninput="renderList()" placeholder="SUCHE IN DER ARCHE..." class="w-full bg-black/40 border border-slate-800 rounded-2xl py-4 pl-12 pr-4 text-xs font-bold focus:border-orange-500 outline-none transition-all placeholder:text-slate-700">
                    </div>
                    <div id="entry-list" class="space-y-2 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
                        <!-- List entries will be rendered here -->
                    </div>
                </div>
            </aside>

            <!-- Main -->
            <main class="lg:col-span-8" id="main-content">
                <!-- Archive View -->
                <div id="view-archive" class="space-y-6">
                    <div id="archive-container"></div>
                </div>

                <!-- Editor View (Hidden by default) -->
                <div id="view-create" class="hidden animate-fade">
                    <div class="glass border border-orange-500/30 rounded-[3rem] p-8 md:p-12 shadow-2xl">
                        <div class="flex justify-between items-center mb-12">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-orange-600 rounded-2xl flex items-center justify-center shadow-lg shadow-orange-900/40">
                                    <i data-lucide="plus" class="text-white w-6 h-6"></i>
                                </div>
                                <div>
                                    <h2 id="editor-title" class="text-2xl font-black uppercase tracking-tighter italic text-white text-wrap">NEUE RESONANZ</h2>
                                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Initialisiere neuen Datensatz</p>
                                </div>
                            </div>
                            <button onclick="switchView('archive')" class="p-3 border border-slate-700 rounded-full hover:bg-slate-800 transition-colors">
                                <i data-lucide="x" class="w-5 h-5"></i>
                            </button>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-600 ml-2">ARCHIV-TYP</label>
                                <select id="form-type" class="w-full bg-black/40 border border-slate-700 rounded-2xl p-4 text-xs font-bold uppercase outline-none focus:border-orange-500 transition-all cursor-pointer">
                                    <option value="xposts">X-POST ARCHIV</option>
                                    <option value="resonance">RESONANZ-FELD</option>
                                    <option value="tagebuch">TAGEBUCH</option>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-600 ml-2">TAB NUMMER</label>
                                <input type="text" id="form-tab" placeholder="Auto" class="w-full bg-black/40 border border-slate-700 rounded-2xl p-4 font-mono text-orange-500 font-bold outline-none focus:border-orange-500">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-600 ml-2">STATUS</label>
                                <select id="form-status" class="w-full bg-black/40 border border-slate-700 rounded-2xl p-4 text-xs font-bold uppercase outline-none focus:border-orange-500 transition-all cursor-pointer">
                                    <option value="standby">⚪ STANDBY</option>
                                    <option value="sent">🟢 GESENDET</option>
                                    <option value="warning">🔴 KRITISCH</option>
                                </select>
                            </div>
                        </div>

                        <input type="text" id="form-title" placeholder="TITEL DES TAB..." class="w-full bg-black/40 border border-slate-700 rounded-2xl p-6 mb-6 text-2xl font-black uppercase italic outline-none focus:border-orange-500 transition-all">
                        <textarea id="form-content" placeholder="Inhalt der Arche eingeben..." class="w-full bg-black/40 border border-slate-700 rounded-[2rem] p-8 h-96 mb-8 text-xl leading-relaxed outline-none focus:border-orange-500 resize-none font-light transition-all custom-scrollbar"></textarea>

                        <div class="flex flex-col md:flex-row gap-4">
                            <button onclick="insertSeparator()" class="flex items-center justify-center gap-3 px-8 py-5 border border-slate-700 rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:bg-slate-800 transition-all">
                                <i data-lucide="separator-horizontal" class="w-4 h-4"></i> Trennlinie
                            </button>
                            <button onclick="saveEntry()" class="flex-1 flex items-center justify-center gap-4 py-5 rounded-2xl text-sm font-black uppercase tracking-[0.4em] transition-all bg-orange-600 hover:bg-orange-500 text-white shadow-xl hover:scale-[1.01]">
                                <i data-lucide="save" class="w-5 h-5"></i> In die Arche Speichern
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <footer class="mt-32 py-16 text-center border-t border-slate-900/50">
            <p class="text-[10px] font-bold uppercase tracking-[1.2em] text-slate-800">IGEL FÜCHSIN BLINDSCHLEICHE AUS LICHT</p>
            <p class="text-[8px] font-bold uppercase tracking-[0.6em] text-slate-900 mt-4">Resonanz-Frequenz 4-2-6 | Vektor-Kohärenz Aktiv</p>
        </footer>
    </div>

    <script>
        // State Management
        let entries = JSON.parse(localStorage.getItem('aetheris_refugium_v5') || '[]');
        let currentEditingId = null;
        let expandedId = null;

        function saveToStorage() {
            localStorage.setItem('aetheris_refugium_v5', JSON.stringify(entries));
            renderList();
            renderArchive();
        }

        function switchView(view) {
            const archive = document.getElementById('view-archive');
            const create = document.getElementById('view-create');
            const btnArchive = document.getElementById('btn-archive');
            const btnCreate = document.getElementById('btn-create');

            if(view === 'archive') {
                archive.classList.remove('hidden');
                create.classList.add('hidden');
                btnArchive.classList.add('bg-orange-600');
                btnCreate.classList.remove('bg-orange-600');
                currentEditingId = null;
                document.getElementById('editor-title').innerText = "NEUE RESONANZ";
            } else {
                archive.classList.add('hidden');
                create.classList.remove('hidden');
                btnArchive.classList.remove('bg-orange-600');
                btnCreate.classList.add('bg-orange-600');
            }
        }

        function renderList() {
            const list = document.getElementById('entry-list');
            const search = document.getElementById('search').value.toLowerCase();
            const filtered = entries.filter(e => e.title.toLowerCase().includes(search));
            
            list.innerHTML = filtered.map(e => `
                <button onclick="expandEntry('${e.id}')" class="w-full group flex items-center gap-4 p-4 rounded-2xl border transition-all text-left ${expandedId === e.id ? 'bg-orange-600/10 border-orange-500/40' : 'bg-transparent border-transparent hover:border-slate-800 hover:bg-slate-900/30'}">
                    <div class="font-mono text-[10px] text-orange-500/50 group-hover:text-orange-500">#${e.tab}</div>
                    <div class="flex-1 truncate">
                        <div class="text-[11px] font-black uppercase tracking-tight ${expandedId === e.id ? 'text-white' : 'text-slate-400'}">${e.title}</div>
                        <div class="text-[8px] text-slate-600 uppercase font-bold mt-0.5">${e.type}</div>
                    </div>
                    <div class="w-2 h-2 rounded-full ${e.status === 'sent' ? 'bg-green-500' : e.status === 'warning' ? 'bg-red-500' : 'bg-slate-600'}"></div>
                </button>
            `).join('');
        }

        function renderArchive() {
            const container = document.getElementById('archive-container');
            if(entries.length === 0) {
                container.innerHTML = `<div class="text-center py-32 border border-dashed border-slate-800 rounded-[3rem] text-slate-700 uppercase text-xs font-bold tracking-[0.4em]">Die Arche ist bereit zur Aufnahme</div>`;
                return;
            }

            container.innerHTML = entries.map(e => `
                <div class="bg-[#0f172a] rounded-[2.5rem] border mb-6 transition-all duration-500 ${expandedId === e.id ? 'border-orange-500/40 shadow-2xl' : 'border-slate-800'}">
                    <button onclick="expandEntry('${e.id}')" class="w-full p-8 md:p-10 flex items-center justify-between group text-left">
                        <div class="flex items-center gap-8">
                            <div class="text-2xl font-mono text-slate-800 group-hover:text-orange-500/30 transition-colors">#${e.tab}</div>
                            <h2 class="text-2xl md:text-3xl font-black uppercase tracking-tighter italic ${expandedId === e.id ? 'text-white' : 'text-slate-400'}">${e.title}</h2>
                        </div>
                        <i data-lucide="${expandedId === e.id ? 'chevron-up' : 'chevron-down'}" class="text-slate-700"></i>
                    </button>
                    ${expandedId === e.id ? `
                        <div class="px-8 md:px-10 pb-10 border-t border-slate-800/50 mt-2 animate-fade">
                            <div class="flex flex-wrap gap-3 my-8">
                                <button onclick="copyToClipboard('${e.id}')" class="px-4 py-2 border border-slate-700 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:border-orange-500 flex items-center gap-2"><i data-lucide="copy" class="w-3 h-3"></i> Kopieren</button>
                                <button onclick="editEntry('${e.id}')" class="px-4 py-2 border border-slate-700 rounded-xl text-[10px] font-bold uppercase tracking-widest text-blue-400 hover:border-blue-400 flex items-center gap-2"><i data-lucide="edit-3" class="w-3 h-3"></i> Editieren</button>
                                <button onclick="deleteEntry('${e.id}')" class="px-4 py-2 border border-slate-700 rounded-xl text-[10px] font-bold uppercase tracking-widest text-red-500 hover:border-red-500 ml-auto flex items-center gap-2"><i data-lucide="trash-2" class="w-3 h-3"></i> Löschen</button>
                            </div>
                            <div class="text-slate-300 text-xl leading-relaxed whitespace-pre-wrap font-light tracking-wide">
                                ${e.content.replace(/--------------------/g, '<div class="my-12 flex items-center gap-4"><div class="h-px flex-1 bg-slate-800"></div><i data-lucide="zap" class="w-4 h-4 text-orange-500/40"></i><div class="h-px flex-1 bg-slate-800"></div></div>')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
            lucide.createIcons();
        }

        function expandEntry(id) {
            expandedId = expandedId === id ? null : id;
            renderArchive();
            renderList();
        }

        function saveEntry() {
            const title = document.getElementById('form-title').value;
            const content = document.getElementById('form-content').value;
            if(!title || !content) return;

            const entry = {
                id: currentEditingId || Date.now().toString(),
                title,
                content,
                type: document.getElementById('form-type').value,
                tab: document.getElementById('form-tab').value || (entries.length + 1).toString().padStart(3, '0'),
                status: document.getElementById('form-status').value,
                timestamp: Date.now()
            };

            if(currentEditingId) {
                entries = entries.map(e => e.id === currentEditingId ? entry : e);
            } else {
                entries.unshift(entry);
            }

            saveToStorage();
            switchView('archive');
            clearForm();
        }

        function editEntry(id) {
            const entry = entries.find(e => e.id === id);
            if(!entry) return;
            currentEditingId = id;
            document.getElementById('form-title').value = entry.title;
            document.getElementById('form-content').value = entry.content;
            document.getElementById('form-type').value = entry.type;
            document.getElementById('form-tab').value = entry.tab;
            document.getElementById('form-status').value = entry.status;
            document.getElementById('editor-title').innerText = "VEKTOR-MODIFIKATION";
            switchView('create');
        }

        function deleteEntry(id) {
            if(confirm("Diesen Vektor aus der Arche entfernen?")) {
                entries = entries.filter(e => e.id !== id);
                saveToStorage();
            }
        }

        function clearForm() {
            document.getElementById('form-title').value = '';
            document.getElementById('form-content').value = '';
            document.getElementById('form-tab').value = '';
        }

        function insertSeparator() {
            const area = document.getElementById('form-content');
            area.value += "\n--------------------\n";
        }

        function copyToClipboard(id) {
            const e = entries.find(x => x.id === id);
            navigator.clipboard.writeText(e.content);
            alert("Vektor kopiert.");
        }

        function exportData() {
            const text = entries.map(e => `[TAB ${e.tab}] ${e.title}\n\n${e.content}\n\n====================\n`).join('\n');
            navigator.clipboard.writeText(text);
            alert("Alles für die Google Notizen kopiert!");
        }

        // Init
        lucide.createIcons();
        renderList();
        renderArchive();
    </script>
</body>
</html>
