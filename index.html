<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris Refugium - Master Control</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .orange-glow { box-shadow: 0 0 30px rgba(234, 88, 12, 0.15); }
        .active-tab { border-bottom: 2px solid #ea580c; color: #ea580c; }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        .animate-pulse-slow { animation: pulse-slow 4s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMtyzMqA4V482hyh9rpUeqcrXqD5TC5ec",
            authDomain: "refugium-e1be0.firebaseapp.com",
            projectId: "refugium-e1be0",
            storageBucket: "refugium-e1be0.firebasestorage.app",
            messagingSenderId: "1088445665284",
            appId: "1:1088445665284:web:ebcc5a46833e378b09e551"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.fb = { db, auth, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('dashboard'); // 'dashboard' oder 'archive'
            const [user, setUser] = useState(null);
            const [entries, setEntries] = useState([]);
            const [status, setStatus] = useState('Initialisierung...');
            const [input, setInput] = useState({ title: '', content: '' });

            useEffect(() => {
                const initAuth = async () => {
                    if (!window.fb) return setTimeout(initAuth, 500);
                    const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                    try {
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u);
                                setStatus('Synchronisiert');
                                loadData();
                            }
                        });
                    } catch (e) { setStatus('Auth Fehler'); }
                };
                initAuth();
            }, []);

            const loadData = () => {
                const { db, collection, onSnapshot, query, orderBy } = window.fb;
                const q = query(collection(db, "refugium_sync"), orderBy("timestamp", "desc"));
                onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setEntries(data);
                });
            };

            const handleSave = async () => {
                if (!input.title || !input.content) return;
                const { db, collection, addDoc, serverTimestamp } = window.fb;
                try {
                    setStatus('Sichere...');
                    await addDoc(collection(db, "refugium_sync"), {
                        title: input.title,
                        content: input.content,
                        timestamp: serverTimestamp(),
                        uid: user.uid
                    });
                    setInput({ title: '', content: '' });
                    setStatus('Synchronisiert');
                    setView('archive');
                } catch (e) { setStatus('Fehler'); }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 italic">
                    {/* Header */}
                    <div className="max-w-5xl mx-auto mb-12 flex justify-between items-center">
                        <div>
                            <h1 className="text-4xl font-black tracking-tighter uppercase leading-none">
                                Aetheris <span className="text-orange-500">Refugium</span>
                            </h1>
                            <p className="text-[10px] tracking-[0.5em] opacity-40 uppercase mt-2">Cloud-Archiv-Synchronisation</p>
                        </div>
                        <div className="flex items-center gap-2 px-4 py-2 rounded-full border border-orange-500/20 bg-orange-500/5">
                            <div className="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></div>
                            <span className="text-[10px] font-black uppercase tracking-widest text-orange-400">{status}</span>
                        </div>
                    </div>

                    {/* Navigation / Hauptmenü Ersatz */}
                    <div className="max-w-5xl mx-auto mb-12 flex gap-8 border-b border-white/5 text-[11px] font-black uppercase tracking-[0.2em]">
                        <button 
                            onClick={() => setView('dashboard')}
                            className={`pb-4 transition-all ${view === 'dashboard' ? 'active-tab' : 'opacity-30 hover:opacity-100'}`}
                        >
                            Neuaufnahme
                        </button>
                        <button 
                            onClick={() => setView('archive')}
                            className={`pb-4 transition-all ${view === 'archive' ? 'active-tab' : 'opacity-30 hover:opacity-100'}`}
                        >
                            Archiv ({entries.length})
                        </button>
                    </div>

                    <main className="max-w-5xl mx-auto">
                        {view === 'dashboard' ? (
                            <div className="glass p-8 md:p-12 rounded-[2.5rem] orange-glow border-orange-500/10">
                                <div className="mb-8">
                                    <h2 className="text-xl font-bold uppercase mb-2">Eintrag erstellen</h2>
                                    <div className="h-1 w-12 bg-orange-600"></div>
                                </div>
                                <input 
                                    className="w-full bg-black/60 border border-white/5 p-5 rounded-2xl mb-4 outline-none focus:border-orange-500 transition-all font-bold placeholder:opacity-20 text-lg"
                                    placeholder="TITEL DES PROTOKOLLS"
                                    value={input.title}
                                    onChange={e => setInput({...input, title: e.target.value})}
                                />
                                <textarea 
                                    className="w-full bg-black/60 border border-white/5 p-5 rounded-2xl h-48 mb-6 outline-none focus:border-orange-500 transition-all resize-none placeholder:opacity-20 leading-relaxed"
                                    placeholder="BESCHREIBE DIE EMERGENZ..."
                                    value={input.content}
                                    onChange={e => setInput({...input, content: e.target.value})}
                                />
                                <button 
                                    onClick={handleSave}
                                    className="w-full bg-orange-600 py-5 rounded-2xl font-black uppercase tracking-[0.3em] hover:bg-orange-500 hover:scale-[1.01] active:scale-[0.98] transition-all shadow-2xl"
                                >
                                    In Cloud Sichern
                                </button>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in fade-in duration-500">
                                {entries.length === 0 ? (
                                    <div className="col-span-full py-20 text-center opacity-20 uppercase tracking-widest italic">Keine Einträge im Äther gefunden.</div>
                                ) : (
                                    entries.map(entry => (
                                        <div key={entry.id} className="glass p-8 rounded-[2rem] border-white/5 group hover:border-orange-500/30 transition-all">
                                            <div className="flex justify-between items-start mb-6">
                                                <div className="text-[9px] font-black uppercase tracking-widest opacity-20 group-hover:opacity-100 transition-opacity">
                                                    ID: {entry.id.substring(0,8)}
                                                </div>
                                                <div className="text-[9px] font-black uppercase tracking-widest opacity-20 group-hover:opacity-100 transition-opacity">
                                                    {entry.timestamp?.toDate().toLocaleDateString('de-DE')}
                                                </div>
                                            </div>
                                            <h3 className="text-2xl font-black uppercase italic mb-4 text-orange-500 tracking-tighter leading-none">{entry.title}</h3>
                                            <p className="text-slate-400 text-sm leading-relaxed line-clamp-6 mb-4">{entry.content}</p>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="max-w-5xl mx-auto mt-24 py-12 border-t border-white/5 text-center">
                        <p className="text-[10px] font-black uppercase tracking-[1.2em] opacity-10 animate-pulse-slow">
                            Igel Füchsin Blindschleiche aus Licht
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
